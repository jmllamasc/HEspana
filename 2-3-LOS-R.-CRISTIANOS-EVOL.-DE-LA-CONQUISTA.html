ansform&#xf3; la Pen&#xed;nsula desde los<br>\npeque&#xf1;os n&#xfa;cleos cant&#xe1;bricos y pirenaicos hasta el dominio de casi todo el<br>\nterritorio. Importa porque define la formaci&#xf3;n de los reinos peninsulares y<br>\ndos modelos pol&#xed;ticos opuestos: el centralismo castellano y el pactismo<br>\naragon&#xe9;s. Su consecuencia hist&#xf3;rica es la articulaci&#xf3;n territorial y<br>\npol&#xed;tica que desembocar&#xe1; en la uni&#xf3;n din&#xe1;stica de los Reyes Cat&#xf3;licos.","children":[],"payload":{"tag":"li","lines":"66,74"}}],"payload":{"tag":"h2","lines":"64,65"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Covadonga (722)</strong> &#x2192; mito fundacional del primer reino cristiano (Astur)","children":[],"payload":{"tag":"li","lines":"76,77"}},{"content":"<strong>Sancho el Mayor (1035)</strong> &#x2192; su reparto origina el reino de Arag&#xf3;n","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"<strong>Toledo (1085)</strong> &#x2192; primer gran avance castellano sobre Al-&#xc1;ndalus","children":[],"payload":{"tag":"li","lines":"78,79"}},{"content":"<strong>Navas de Tolosa (1212)</strong> &#x2192; batalla decisiva que abre la conquista del sur","children":[],"payload":{"tag":"li","lines":"79,80"}},{"content":"<strong>Fernando III y Jaime I (s. XIII)</strong> &#x2192; culminaci&#xf3;n de la conquista (Guadalquivir, Valencia, Baleares)","children":[],"payload":{"tag":"li","lines":"80,81"}},{"content":"<strong>Castilla centralizada &#x2194; Arag&#xf3;n pactista</strong> &#x2192; dos modelos pol&#xed;ticos clave de la Edad Media","children":[],"payload":{"tag":"li","lines":"81,83"}}],"payload":{"tag":"h2","lines":"74,75"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<p data-lines=\"87,88\"><strong>RECONQUISTA:</strong> proceso de expansi&#xf3;n territorial de los reinos cristianos a costa de Al-&#xc1;ndalus (<strong>s. VIII-XV</strong>).</p>","children":[],"payload":{"tag":"li","lines":"87,89"}},{"content":"\n<p data-lines=\"89,90\"><strong>REPOBLACI&#xd3;N:</strong> ocupaci&#xf3;n y colonizaci&#xf3;n con poblaci&#xf3;n cristiana de las tierras conquistadas o despobladas.</p>","children":[],"payload":{"tag":"li","lines":"89,91"}},{"content":"\n<p data-lines=\"91,92\"><strong>PRESURA (o <em>aprisio</em> en Catalu&#xf1;a):</strong> repoblaci&#xf3;n libre del valle del Duero (s. VIII-X) &#x2192; quien ocupaba y cultivaba una tierra se la apropiaba.</p>","children":[],"payload":{"tag":"li","lines":"91,93"}},{"content":"\n<p data-lines=\"93,94\"><strong>REPOBLACI&#xd3;N CONCEJIL:</strong> modelo de los valles del Tajo y Ebro (s. XI-XII) &#x2192; tierras a comunidades de vecinos (<em>concejos</em>) con <strong>fueros</strong> a cambio de defender la frontera.</p>","children":[],"payload":{"tag":"li","lines":"93,95"}},{"content":"\n<p data-lines=\"95,96\"><strong>FUERO:</strong> conjunto de privilegios y libertades que permit&#xed;a a un concejo gobernarse de forma aut&#xf3;noma.</p>","children":[],"payload":{"tag":"li","lines":"95,97"}},{"content":"\n<p data-lines=\"97,98\"><strong>CURIA REGIA:</strong> &#xf3;rgano de asesores del rey en tareas de gobierno.</p>","children":[],"payload":{"tag":"li","lines":"97,99"}},{"content":"\n<p data-lines=\"99,100\"><strong>MONARQU&#xcd;A PACTISTA:</strong> sistema aragon&#xe9;s en que el rey comparte el poder y pacta sus decisiones con las <strong>Cortes</strong>.</p>","children":[],"payload":{"tag":"li","lines":"99,101"}},{"content":"\n<p data-lines=\"101,102\"><strong>MONARQU&#xcd;A CENTRALIZada:</strong> modelo castellano de concentraci&#xf3;n progresiva del poder en el rey.</p>","children":[],"payload":{"tag":"li","lines":"101,103"}},{"content":"\n<p data-lines=\"103,104\"><strong>ALMOR&#xc1;VIDES:</strong> pueblo norteafricano que frena el avance cristiano en <strong>Sagrajas (1086)</strong> y <strong>Ucl&#xe9;s (1108)</strong>.</p>","children":[],"payload":{"tag":"li","lines":"103,105"}}],"payload":{"t \">\n<tr data-lines=\"144,145\">\n<th>Concepto</th>\n<th>Corona de Castilla</th>\n<th>Corona de Arag&#xf3;n</th>\n</tr>\n</thead>\n<tbody data-lines=\"146,150\">\n<tr data-lines=\"146,147\">\n<td><strong>Estructura</strong></td>\n<td>Reino unificado</td>\n<td>Confederaci&#xf3;n de territorios</td>\n</tr>\n<tr data-lines=\"147,148\">\n<td><strong>Modelo pol&#xed;tico</strong></td>\n<td>Monarqu&#xed;a centralizada</td>\n<td>Monarqu&#xed;a pactista</td>\n</tr>\n<tr data-lines=\"148,149\">\n<td><strong>Poder real</strong></td>\n<td>M&#xe1;s fuerte y concentrado</td>\n<td>Limitado por las Cortes</td>\n</tr>\n<tr data-lines=\"149,150\">\n<td><strong>Toma de decisiones</strong></td>\n<td>Autoridad del rey</td>\n<td>Aprobadas por Cortes</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"144,150"}}],"payload":{"tag":"h2","lines":"142,143"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. Explica el origen y la formaci&#xf3;n de los primeros reinos cristianos (s. VIII-X).","children":[],"payload":{"tag":"li","lines":"155,156","listIndex":1}},{"content":"2. Describe las cuatro etapas de la conquista cristiana e indica sus principales hitos y reyes.","children":[],"payload":{"tag":"li","lines":"156,157","listIndex":2}},{"content":"3. &#xbf;Qu&#xe9; importancia tuvo la batalla de las <strong>Navas de Tolosa (1212)</strong> en la evoluci&#xf3;n de la conquista?","children":[],"payload":{"tag":"li","lines":"157,158","listIndex":3}},{"content":"4. Compara la organizaci&#xf3;n pol&#xed;tica de la <strong>Corona de Castilla</strong> y la <strong>Corona de Arag&#xf3;n</strong>.","children":[],"payload":{"tag":"li","lines":"158,159","listIndex":4}},{"content":"5. Define los siguientes t&#xe9;rminos: <em>presura</em>, <em>repoblaci&#xf3;n concejil</em>, <em>fuero</em>, <em>curia regia</em>, <em>monarqu&#xed;a pactista</em>.","children":[],"payload":{"tag":"li","lines":"159,160","listIndex":5}},{"content":"6. Sit&#xfa;a cronol&#xf3;gicamente y exp
