nt":"<strong>Desde el siglo IX</strong> &#x2192; recopilaci&#xf3;n de textos persas, indios y griegos","children":[],"payload":{"tag":"li","lines":"44,45"}},{"content":"<strong>En el siglo X</strong> &#x2192; florecimiento de:","children":[{"content":"<em>Literatura</em> &#x2192; <strong>Ibn Hazem</strong>","children":[],"payload":{"tag":"li","lines":"46,47"}},{"content":"<em>Filosof&#xed;a</em> &#x2192; <strong>Averroes</strong>, comentarista de <strong>Arist&#xf3;teles</strong>","children":[],"payload":{"tag":"li","lines":"47,48"}},{"content":"<em>Ciencia</em> &#x2192; matem&#xe1;ticas y medicina (<strong>Abulcasis</strong>)","children":[],"payload":{"tag":"li","lines":"48,49"}}],"payload":{"tag":"li","lines":"45,49"}},{"content":"<strong>Difusi&#xf3;n del sistema de numeraci&#xf3;n indio</strong> en Europa","children":[],"payload":{"tag":"li","lines":"49,51"}}],"payload":{"tag":"h3","lines":"43,44"}},{"content":"2. Tolerancia religiosa","children":[{"content":"Tolerancia hacia las <strong>&quot;religiones del Libro&quot;</strong>","children":[],"payload":{"tag":"li","lines":"52,53"}},{"content":"Comunidades cristianas y jud&#xed;as &#x27f6; vida, bienes y culto garantizados","children":[],"payload":{"tag":"li","lines":"53,54"}},{"content":"<strong>Autonom&#xed;a jur&#xed;dica</strong> propia","children":[],"payload":{"tag":"li","lines":"54,56"}}],"payload":{"tag":"h3","lines":"51,52"}}],"payload":{"tag":"h2","lines":"41,42"}},{"content":"D. El Legado Jud&#xed;o en la Pen&#xed;nsula Ib&#xe9;rica","children":[{"content":"1. Auge de la cultura sefard&#xed; (ss. X-XI)","children":[{"content":"Avances en filosof&#xed;a, teolog&#xed;a, ciencia, gram&#xe1;tica y poes&#xed;a","children":[],"payload":{"tag":"li","lines":"61,62"}},{"content":"<strong>Recuperaci&#xf3;n de textos cl&#xe1;sicos griegos</strong> &#x2192; traducci&#xf3;n","children":[],"payload":{"tag":"li","lines":"62,63"}},{"content":"Influencia decisiva en el pensamiento y la ciencia de la <strong>Europa medieval</strong>","children":[],"payload":{"tag":"li","lines":"63,65"}}],"payload":{"tag":"h3","lines":"60,61"}}],"payload":{"tag":"h2","lines":"58,59"}},{"content":"Conclusi&#xf3;n","children":[{"content":"Al-&#xc1;ndalus fue una civilizaci&#xf3;n avanzada cuya econom&#xed;a agr&#xed;cola e<br>\nintensamente comercial sostuvo una sociedad jerarquizada y multicultural.<br>\nSu esplendor cultural en filosof&#xed;a, ciencia y medicina, junto al auge<br>\nsefard&#xed;, convirti&#xf3; a la Pen&#xed;nsula en puente transmisor del saber cl&#xe1;sico<br>\nhacia la Europa medieval. Su importancia radica en haber preservado y<br>\ndifundido conocimiento que result&#xf3; decisivo para el posterior desarrollo<br>\nintelectual europeo.","children":[],"payload":{"tag":"li","lines":"68,76"}}],"payload":{"tag":"h2","lines":"67,68"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Regad&#xed;o (noria, acequia, alberca)</strong> &#x2192; revoluci&#xf3;n agr&#xed;cola que sustenta la econom&#xed;a andalus&#xed;","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"<strong>Dirham y dinar</strong> &#x2192; monedas que evidencian un comercio fuerte y urbano","children":[],"payload":{"tag":"li","lines":"78,79"}},{"content":"<strong>Sociedad jerarquizada (&#xe1;rabes / mulad&#xed;es / moz&#xe1;rabes / esclavos)</strong> &#x2192; clave para entender la estructura social","children":[],"payload":{"tag":"li","lines":"79,80"}},{"content":"<strong>Averroes y Abulcasis</strong> &#x2192; m&#xe1;ximos exponentes de la filosof&#xed;a y la ciencia andalus&#xed;es","children":[],"payload":{"tag":"li","lines":"80,81"}},{"content":"<strong>&quot;Religiones del Libro&quot;</strong> &#x2192; concepto esencial sobre la tolerancia religiosa","children":[],"payload":{"tag":"li","lines":"81,82"}},{"content":"<strong>Cultura sefard&#xed; (ss. X-XI)</strong> &#x2192; transmisi&#xf3;n del saber cl&#xe1;sico a Europa, n&#xfa;cleo del legado jud&#xed;o","children":[],"payload":{"tag":"li","lines":"82,84"}}],"payload":{"tag":"h2","lines":"76,77"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<p data-lines=\"88,89\"><strong>AL-&#xc1;NDALUS:</strong> territorio de la Pen&#xed;nsula Ib&#xe9;rica bajo dominio musulm&#xe1;n (711-1492).</p>","children":[],"payload":{"tag":"li","lines":"88,90"}},{"content":"\n<p data-lines=\"90,91\"><strong>NORIA:</strong> m&#xe1;quina hidr&#xe1;ulica de ruedas y cangilones para elevar agua de un r&#xed;o o pozo hacia las acequias.</p>","children":[],"payload":{"tag":"li","lines":"90,92"}},{"content":"\n<p data-lines=\"92,93\"><strong>ACEQUIA:</strong> canal artificial que distribuye el agua de riego entre los campos.</p>","children":[],"payload":{"tag":"li","lines":"92,94"}},{"content":"\n<p data-lines=\"94,95\"><strong>ALBERCA:</strong> dep&#xf3;sito artificial donde se almacena el agua para el riego.</p>","children":[],"payload":{"tag":"li","lines":"94,96"}},{"content":"\n<p data-lines=\"96,97\"><strong>ALMAZARA:</strong> molino donde se prensa la aceituna para obtener aceite.</p>","children":[],"payload":{"tag":"li","lines":"96,98"}},{"content":"\n<p data-lines=\"98,99\"><strong>DIEZMO:</strong> impuesto equivalente a la d&#xe9;cima parte de la producci&#xf3;n o renta.</p>","children":[],"payload":{"tag":"li","lines":"98,100"}},{"content":"\n<p data-lines=\"100,101\"><strong>DIRHAM:</strong> moneda de plata del mundo isl&#xe1;mico, base del comercio andalus&#xed;.</p>","children":[],"payload":{"tag":"li","lines":"100,102"}},{"content":"\n<p data-lines=\"102,103\"><strong>DINAR:</strong> moneda de oro del mundo isl&#xe1;mico, de alto valor.</p>","children":[],"payload":{"tag":"li","lines":"102,104"}},{"content":"\n<p data-lines=\"104,105\"><strong>ALCAICER&#xcd;A:</strong> zona cerrada del zoco donde se vend&#xed;an los productos de lujo (seda, orfebrer&#xed;a, marfil).</p>","children":[],"payload":{"tag":"li","lines":"104,106"}},{"content":"\n<p data-lines=\"106,107\"><strong>MULAD&#xcd;:</strong> hispanovisigodo (cristiano) convertido al islam.</p>","children":[],"payload":{"tag":"li","lines":"106,108"}},{"content":"\n<p data-lines=\"108,109\"><strong>MOZ&#xc1;RABE:</strong> cristiano que viv&#xed;a en territorio musulm&#xe1;n conservando su religi&#xf3;n.</p>","children":[],"payload":{"tag":"li","lines":"108,110"}},{"content":"\n<p data-lines=\"110,111\"><strong>EMIR:</strong> gobernante con autoridad pol&#xed;tica y militar; en Al-&#xc1;ndalus, inicialmente dependiente del califa de Damasco/Bagdad.</p>","children":[],"payload":{"tag":"li","lines":"110,112"}},{"content":"\n<p data-lines=\"112,113\"><strong>CALIFA:</strong> m&#xe1;xima autoridad pol&#xed;tica y religiosa del islam; en C&#xf3;rdoba desde el 929 (Abd al-Rahm&#xe1;n III).</p>","children":[],"payload":{"tag":"li","lines":"112,114"}},{"content":"\n<p data-lines=\"114,115\"><strong>HACHIB:</strong> primer ministro o jefe de gobierno, m&#xe1;ximo cargo tras el califa.</p>","children":[],"payload":{"tag":"li","lines":"114,116"}},{"content":"\n<p data-lines=\"116,117\"><strong>VISIR:</strong> ministro encargado de un &#xe1;rea de la administraci&#xf3;n.</p>","children":[],"payload":{"tag":"li","lines":"116,118"}},{"content":"\n<p data-lines=\"118,119\"><strong>CAD&#xcd;:</strong> juez que aplicaba la ley isl&#xe1;mica (la <em>shar&#xed;a</em>).</p>","children":[],"payload":{"tag":"li","lines":"118,120"}},{"content":"\n<p data-lines=\"120,121\"><strong>WAL&#xcd;:</strong> gobernador de una provincia o circunscripci&#xf3;n territorial.</p>","children":[],"payload":{"tag":"li","lines":"120,122"}},{"content":"\n<p data-lines=\"122,123\"><strong>&quot;RELIGIONES DEL LIBRO&quot;:</strong> jud&#xed;os y cristianos, tolerados por el islam por compartir un libro sagrado revelado; pagaban impuestos especiales a cambio de protecci&#xf3;n.</p>","children":[],"payload":{"tag":"li","lines":"122,124"}}],"payload":{"tag":"h2","lines":"86,87"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"<strong>ECONOM&#xcd;A</strong> &#x2192; agricultura de <strong>regad&#xed;o</strong> (noria, acequia, alberca) + nuevos cultivos (ca&#xf1;a de az&#xfa;car, arroz, algod&#xf3;n) + comercio urbano con <strong>dirham</strong> (plata) y <strong>dinar</strong> (oro).","children":[],"payload":{"tag":"li","lines":"138,139"}},{"content":"<strong>SOCIEDAD</strong> &#x2192; jerarquizada: <em>&#xe1;rabes</em> (&#xe9;lite) &gt; <em>bereberes/mulad&#xed;es</em> &gt; <em>jud&#xed;os/moz&#xe1;rabes</em> (m&#xe1;s impuestos) &gt; <em>esclavos</em>.","children":[],"payload":{"tag":"li","lines":"139,140"}},{"content":"<strong>ADMINISTRACI&#xd3;N</strong> &#x2192; <strong>emir/califa</strong> (poder) &#x2192; <strong>hachib</strong> (1er ministro) &#x2192; <strong>visires</strong> &#x2192; <strong>cad&#xed;es</strong> (justicia) &#x2192; <strong>wal&#xed;es</strong> (provincias).","children":[],"payload":{"tag":"li","lines":"140,141"}},{"content":"<strong>CULTURA</strong> &#x2192; esplendor ss. IX-X: <strong>Averroes</strong> (filosof&#xed;a), <strong>Abulcasis</strong> (medicina), <strong>Ibn Hazem</strong> (literatura) + tolerancia a las <strong>&quot;religiones del Libro&quot;</strong>.","children":[],"payload":{"tag":"li","lines":"141,142"}},{"content":"<strong>LEGADO JUD&#xcd;O</strong> &#x2192; cultura <strong>sefard&#xed;</strong> (ss. X-XI) &#x27f6; traduce y transmite el saber cl&#xe1;sico griego a la <strong>Europa medieval</strong>.","children":[],"payload":{"tag":"li","lines":"142,144"}}],"payload":{"tag":"h2","lines":"134,135"}},{"content":"Tablas comparativas","children":[{"content":"1. Grupos sociales de Al-&#xc1;ndalus","children":[{"content":"<table data-lines=\"154,162\">\n<thead data-lines=\"154,155\">\n<tr data-lines=\"154,155\">\n<th>Grupo</th>\n<th>Religi&#xf3;n / origen</th>\n<th>Posici&#xf3;n social</th>\n<th>Fiscalidad</th>\n</tr>\n</thead>\n<tbody data-lines=\"156,162\">\n<tr data-lines=\"156,157\">\n<td><strong>&#xc1;rabes</strong></td>\n<td>Musulmanes (&#xe9;lite conquistadora)</td>\n<td>Altos cargos, dominio pol&#xed;tico</td>\n<td>Privilegiados</td>\n</tr>\n<tr data-lines=\"157,158\">\n<td><strong>Bereberes</strong></td>\n<td>Musulmanes (norte de &#xc1;frica)</td>\n<td>Comerciantes y agricultores</td>\n<td>Ordinaria</td>\n</tr>\n<tr data-lines=\"158,159\">\n<td><strong>Mulad&#xed;es</strong></td>\n<td>Cristianos <em>convertidos</em> al islam</td>\n<td>Comerciantes y agricultores</td>\n<td>Ordinaria</td>\n</tr>\n<tr data-lines=\"159,160\">\n<td><strong>Moz&#xe1;rabes</strong></td>\n<td>Cristianos <em>no convertidos</em></td>\n<td>Tolerados, leyes especiales</td>\n<td>M&#xe1;s impuestos</td>\n</tr>\n<tr data-lines=\"160,161\">\n<td><strong>Jud&#xed;os</strong></td>\n<td>Hebreos</td>\n<td>Tolerados, leyes especiales</td>\n<td>M&#xe1;s impuestos</td>\n</tr>\n<tr data-lines=\"161,162\">\n<td><strong>Esclavos</strong></td>\n<td>Eslavos del norte de Europa</td>\n<td>Base de la pir&#xe1;mide</td>\n<td>&#x2014;</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"154,162"}}],"payload":{"tag":"h3","lines":"152,153"}},{"content":"2. Cargos de la administraci&#xf3;n","children":[{"content":"<table data-lines=\"165,172\">\n<thead data-lines=\"165,166\">\n<tr data-lines=\"165,166\">\n<th>Cargo</th>\n<th>Funci&#xf3;n</th>\n<th>&#xc1;mbito</th>\n</tr>\n</thead>\n<tbody data-lines=\"167,172\">\n<tr data-lines=\"167,168\">\n<td><strong>Emir / Califa</strong></td>\n<td>Poder pol&#xed;tico y religioso</td>\n<td>Todo Al-&#xc1;ndalus</td>\n</tr>\n<tr data-lines=\"168,169\">\n<td><strong>Hachib</strong></td>\n<td>Primer ministro / jefe de gobierno</td>\n<td>Central</td>\n</tr>\n<tr data-lines=\"169,170\">\n<td><strong>Visir</strong></td>\n<td>Ministro de un &#xe1;rea</td>\n<td>Central</td>\n</tr>\n<tr data-lines=\"170,171\">\n<td><strong>Cad&#xed;</strong></td>\n<td>Justicia (aplica la <em>shar&#xed;a</em>)</td>\n<td>Local / judicial</td>\n</tr>\n<tr data-lines=\"171,172\">\n<td><strong>Wal&#xed;</strong></
