rb&#xf3;nica","children":[{"content":"<strong>Austria</strong> &#xb7; <strong>Reino Unido</strong> &#xb7; <strong>Provincias Unidas</strong> &#xb7; <strong>Portugal</strong> &#xb7; <strong>Prusia</strong> &#xb7; <strong>Saboya</strong>","children":[],"payload":{"tag":"li","lines":"20,22"}}],"payload":{"tag":"li","lines":"19,22"}}],"payload":{"tag":"h2","lines":"15,16"}},{"content":"C. La Guerra de Sucesi&#xf3;n (1701-1714)","children":[{"content":"<strong>Doble naturaleza</strong> &#x2192; conflicto europeo &#x2194; guerra civil espa&#xf1;ola","children":[],"payload":{"tag":"li","lines":"26,27"}},{"content":"Divisi&#xf3;n interna peninsular","children":[{"content":"<strong>Corona de Arag&#xf3;n</strong> &#x2192; apoya al <strong>archiduque Carlos</strong> (<em>modelo foralista</em>)","children":[],"payload":{"tag":"li","lines":"28,29"}},{"content":"<strong>Corona de Castilla</strong> &#x2192; respalda a <strong>Felipe V</strong> (<em>centralismo borb&#xf3;nico</em>)","children":[],"payload":{"tag":"li","lines":"29,30"}}],"payload":{"tag":"li","lines":"27,30"}},{"content":"Desarrollo militar","children":[{"content":"Victorias iniciales de la alianza antiborb&#xf3;nica &#x2192; lleg&#xf3; a <strong>ocupar Madrid</strong>","children":[],"payload":{"tag":"li","lines":"31,32"}},{"content":"Triunfos decisivos de <strong>Felipe V</strong>:","children":[{"content":"<strong>Almansa (1707)</strong>","children":[],"payload":{"tag":"li","lines":"33,34"}},{"content":"<strong>Brihuega</strong> y <strong>Villaviciosa</strong>","children":[],"payload":{"tag":"li","lines":"34,36"}}],"payload":{"tag":"li","lines":"32,36"}}],"payload":{"tag":"li","lines":"30,36"}}],"payload":{"tag":"h2","lines":"24,25"}},{"content":"D. El giro de 1711 y la paz","children":[{"content":"\n<p data-lines=\"40,41\"><strong>Muerte de Jos&#xe9; I (1711)</strong> &#x27f6; el <strong>archiduque Carlos</strong> se convierte en <strong>emperador</strong></p>","children":[],"payload":{"tag":"li","lines":"40,41"}},{"content":"\n<p data-lines=\"41,42\"><strong>Consecuencia</strong> &#x2192; temor a su excesivo poder &#x2192; <strong>Reino Unido</strong> impulsa la paz</p>","children":[],"payload":{"tag":"li","lines":"41,42"}},{"content":"\n<p data-lines=\"42,43\">Tratados de paz</p>","children":[{"content":"<strong>Paz de Utrecht (1713)</strong>","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"<strong>Paz de Rastadt (1714)</strong>","children":[],"payload":{"tag":"li","lines":"44,45"}}],"payload":{"tag":"li","lines":"42,45"}},{"content":"\n<p data-lines=\"45,46\">Resistencia final &#x2192; <strong>Catalu&#xf1;a</strong> hasta <strong>1714</strong> &#xb7; <strong>Mallorca</strong> hasta <strong>1715</strong></p>","children":[],"payload":{"tag":"li","lines":"45,47"}},{"content":"\n<p data-lines=\"47,48\"><strong>PAZ DE UTRECHT (1713) &#x2192;</strong> tratado que pone fin a la guerra, reconoce a Felipe V y reordena el mapa europeo.</p>","children":[],"payload":{"tag":"li","lines":"47,49"}}],"payload":{"tag":"h2","lines":"38,39"}},{"content":"E. Consecuencias de la paz","children":[{"content":"<strong>Gran beneficiado</strong> &#x2192; <strong>Reino Unido</strong>:","children":[{"content":"Territorios &#x2192; <strong>Gibraltar</strong>, <strong>Menorca</strong>, <strong>Terranova</strong>","children":[],"payload":{"tag":"li","lines":"54,55"}},{"content":"Privilegios comerciales &#x2192; <em>nav&#xed;o de permiso</em> y <em>asiento de negros</em>","children":[],"payload":{"tag":"li","lines":"55,56"}},{"content":"<strong>Resultado</strong> &#x27f6; consolida su hegemon&#xed;a pol&#xed;tica y mercantil","children":[],"payload":{"tag":"li","lines":"56,57"}}],"payload":{"tag":"li","lines":"53,57"}},{"content":"<strong>Espa&#xf1;a</strong>","children":[{"content":"Pierde sus posesiones europeas &#x2192; <strong>Austria y Saboya</strong>","children":[],"payload":{"tag":"li","lines":"58,59"}},{"content":"<strong>Felipe V</strong> reconocido como rey &#x2192; renuncia al trono franc&#xe9;s","children":[],"payload":{"tag":"li","lines":"59,61"}}],"payload":{"tag":"li","lines":"57,61"}}],"payload":{"tag":"h2","lines":"51,52"}},{"content":"F. Los Pactos de Familia y el Sistema de Utrecht","children":[{"content":"\n<p data-lines=\"65,66\"><strong>Pactos de Familia (1733, 1743 y 1761)</strong> &#x2192; mantienen la <strong>alianza borb&#xf3;nica</strong> (Francia &#x2194; Espa&#xf1;a)</p>","children":[],"payload":{"tag":"li","lines":"65,66"}},{"content":"\n<p data-lines=\"66,67\">Confirmados por <strong>Carlos III</strong>:</p>","children":[{"content":"Apoy&#xf3; a los independentistas en la <strong>guerra de EE.UU.</strong>","children":[],"payload":{"tag":"li","lines":"67,68"}},{"content":"Recuper&#xf3; <strong>Florida y Menorca</strong> en la <strong>Paz de Versalles (1783)</strong>","children":[],"payload":{"tag":"li","lines":"68,69"}}],"payload":{"tag":"li","lines":"66,69"}},{"content":"\n<p data-lines=\"69,70\">Nuevo orden internacional &#x2192; <strong>&quot;Sistema de Utrecht&quot;</strong></p>","children":[],"payload":{"tag":"li","lines":"69,71"}},{"content":"\n<blockquote data-lines=\"71,72\">\n<p data-lines=\"71,72\"><strong>PACTOS DE FAMILIA &#x2192;</strong> acuerdos de alianza entre las monarqu&#xed;as borb&#xf3;nicas de Francia y Espa&#xf1;a en el siglo XVIII.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"71,73"}}],"payload":{"tag":"h2","lines":"63,64"}},{"content":"Conclusi&#xf3;n","children":[{"content":"La <strong>Guerra de Sucesi&#xf3;n Espa&#xf1;ola (1701-1714)</strong> fue a la vez un conflicto<br>\neuropeo y una guerra civil que enfrent&#xf3; a partidarios del centralismo<br>\nborb&#xf3;nico y del foralismo. Su resoluci&#xf3;n mediante la <strong>Paz de Utrecht (1713)<br>\ninstaur&#xf3; a la dinast&#xed;a <strong>Borb&#xf3;n</strong> en Espa&#xf1;a, consolid&#xf3; la hegemon&#xed;a<br>\nbrit&#xe1;nica y reorden&#xf3; el equilibrio europeo (</strong>&quot;Sistema de Utrecht&quot;**). Sus<br>\nconsecuencias marcaron el inicio de la <strong>Edad Moderna borb&#xf3;nica</strong> y la<br>\ncentralizaci&#xf3;n del Estado espa&#xf1;ol.","children":[],"payload":{"tag":"li","lines":"77,85"}}],"payload":{"tag":"h2","lines":"75,76"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Testamento de Carlos II (1700)</strong> &#x2192; designa a Felipe de Anjou y desencadena el conflicto","children":[],"payload":{"tag":"li","lines":"87,88"}},{"content":"<strong>Corona de Arag&#xf3;n &#x2194; Castilla</strong> &#x2192; divisi&#xf3;n interna foralismo vs. centralismo","children":[],"payload":{"tag":"li","lines":"88,89"}},{"content":"<strong>Almansa (1707)</strong> &#x2192; batalla decisiva a favor de Felipe V","children":[],"payload":{"tag":"li","lines":"89,90"}},{"content":"<strong>Paz de Utrecht (1713)</strong> &#x2192; fin de la guerra, Felipe V rey y auge de Reino Unido (Gibraltar, Menorca)","children":[],"payload":{"tag":"li","lines":"90,91"}},{"content":"<strong>Pactos de Familia (1733, 1743, 1761)</strong> &#x2192; alianza borb&#xf3;nica Francia-Espa&#xf1;a","children":[],"payload":{"tag":"li","lines":"91,92"}},{"content":"<strong>Sistema de Utrecht</strong> &#x2192; nuevo orden internacional del siglo XVIII","children":[],"payload":{"tag":"li","lines":"92,94"}}],"payload":{"tag":"h2","lines":"85,86"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<blockquote data-lines=\"98,99\">\n<p data-lines=\"98,99\"><strong>CONFLICTO SUCESORIO:</strong> disputa por un trono vacante entre varios candidatos con derechos din&#xe1;sticos.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"98,100"}},{"content":"\n<blockquote data-lines=\"100,101\">\n<p data-lines=\"100,101\"><strong>BORB&#xd3;N:</strong> dinast&#xed;a de origen franc&#xe9;s que se instaura en Espa&#xf1;a con Felipe V tras la guerra.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"100,102"}},{"content":"\n<blockquote data-lines=\"102,103\">\n<p data-lines=\"102,103\"><strong>HABSBURGO (Austrias):</strong> dinast&#xed;a reinante en Espa&#xf1;a hasta Carlos II; el archiduque Carlos era su candidato.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"102,104"}},{"content":"\n<blockquote data-lines=\"104,105\">\n<p data-lines=\"104,105\"><strong>MODELO FORALISTA:</strong> sistema pol&#xed;tico que respeta los <em>fueros</em> (leyes e instituciones propias) de cada territorio &#x2192; defendido por la Corona de Arag&#xf3;n.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"104,106"}},{"content":"\n<blockquote data-lines=\"106,107\">\n<p data-lines=\"106,107\"><strong>CENTRALISMO BORB&#xd3;NICO:</strong> modelo de Estado uniforme y centralizado bajo una sola legislaci&#xf3;n &#x2192; impulsado por Felipe V.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"106,108"}},{"content":"\n<blockquote data-lines=\"108,109\">\n<p data-lines=\"108,109\"><strong>NAV&#xcd;O DE PERMISO:</strong> autorizaci&#xf3;n a Reino Unido para enviar un barco anual de mercanc&#xed;as al comercio con la Am&#xe9;rica espa&#xf1;ola.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"108,110"}},{"content":"\n<blockquote data-lines=\"110,111\">\n<p data-lines=\"110,111\"><strong>ASIENTO DE NEGROS:</strong> monopolio concedido a Reino Unido para el comercio de esclavos africanos en las colonias espa&#xf1;olas.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"110,112"}},{"content":"\n<blockquote data-lines=\"112,113\">\n<p data-lines=\"112,113\"><strong>PACTOS DE FAMILIA:</strong> alianzas militares y pol&#xed;ticas entre las ramas borb&#xf3;nicas de Francia y Espa&#xf1;a (1733, 1743, 1761).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"112,114"}},{"content":"\n<blockquote data-lines=\"114,115\">\n<p data-lines=\"114,115\"><strong>SISTEMA DE UTRECHT:</strong> orden internacional surgido tras 1713, basado en el equilibrio de potencias y la hegemon&#xed;a brit&#xe1;nica.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"114,116"}}],"payload":{"tag":"h2","lines":"96,97"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"<strong>Qu&#xe9; es</strong> &#x2192; guerra din&#xe1;stica (1701-1714) por el trono espa&#xf1;ol vacante de <strong>Carlos II</strong>","children":[],"payload":{"tag":"li","lines":"120,121"}},{"content":"<strong>Bandos</strong> &#x2192; <strong>Felipe V</strong> (Borb&#xf3;n &#xb7; Castilla &#xb7; centralismo) &#x2194; <strong>archiduque Carlos</strong> (Habsburgo &#xb7; Arag&#xf3;n &#xb7; foralismo)","children":[],"payload":{"tag":"li","lines":"121,122"}},{"content":"<strong>Causa internacional</strong> &#x2192; temor al <strong>bloque franco-espa&#xf1;ol</strong> &#x2192; <strong>Alianza de La Haya</strong>","children":[],"payload":{"tag":"li","lines":"122,123"}},{"content":"<strong>Batallas clave</strong> &#x2192; <strong>Almansa (1707)</strong>, <strong>Brihuega</strong>, <strong>Villaviciosa</strong>","children":[],"payload":{"tag":"li","lines":"123,124"}},{"content":"<strong>Giro decisivo</strong> &#x2192; <strong>muerte de Jos&#xe9; I (1711)</strong> &#x2192; Reino Unido impulsa la paz","children":[],"payload":{"tag":"li","lines":"124,125"}},{"content":"<strong>Tratados</strong> &#x2192; <strong>Utrecht (1713)</strong> y <strong>Rastadt (1714)</strong> &#xb7; resisten <strong>Catalu&#xf1;a (1714)</strong> y <strong>Mallorca (1715)</strong>","children":[],"payload":{"tag":"li","lines":"125,126"}},{"content":"<strong>Ganador</strong> &#x2192; <strong>Reino Unido</strong>: Gibraltar, Menorca, Terranova + privilegios comerciales","children":[],"payload":{"tag":"li","lines":"126,127"}},{"content":"<strong>Espa&#xf1;a pierde</strong> &#x2192; posesiones europeas (Austria, Saboya); <strong>Felipe V</strong> rey, renuncia al trono franc&#xe9;s","children":[],"payload":{"tag":"li","lines":"127,128"}},{"content":"<strong>Continuidad</strong> &#x2192; <strong>Pactos de Familia</strong> (1733, 1743, 1761) &#x2192; <strong>Carlos III</strong> recupera Florida y Menorca (<strong>Versalles, 1783</strong>)","children":[],"payload":{"tag":"li","lines":"128,130"}}],"payload":{"tag":"h2","lines":"118,119"}},{"content":"Tabla comparativa","children":[{"content":"Bandos enfrentados","children":[{"content":"<table data-lines=\"136,143\">\n<thead data-lines=\"136,137\">\n<tr data-lines=\"136,137\">\n<th>Elemento</th>\n<th>Felipe V (Borb&#xf3;n)</th>\n<th>Archiduque Carlos (Habsburgo)</th>\n</tr>\n</thead>\n<tbody data-lines=\"138,143\">\n<tr data-lines=\"138,139\">\n<td><strong>Dinast&#xed;a</strong></td>\n<td>Borb&#xf3;n (Francia)</td>\n<td>Habsburgo (Austria)</td>\n</tr>\n<tr data-lines=\"139,140\">\n<td><strong>Apoyo peninsular</strong></td>\n<td>Corona de Castilla</td>\n<td>Corona de Arag&#xf3;n</td>\n</tr>\n<tr data-lines=\"140,141\">\n<td><strong>Modelo de Estado</strong></td>\n<td>Centralismo</td>\n<td>Foralismo</td>\n</tr>\n<tr data-lines=\"141,142\">\n<td><strong>Apoyos exteriores</strong></td>\n<td>Francia, Baviera</td>\n<td>Alianza de La Haya</td>\n</tr>\n<tr data-lines=\"142,143\">\n<td><strong>Desenlace</strong></td>\n<td>Reconocido rey de Espa&#xf1;a</td>\n<td>Emperador del Sacro Imperio (1711)</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"136,143"}}],"payload":{"tag":"h3","lines":"134,135"}},{"content":"Tratados de paz","children":[{"content":"<table data-lines=\"146,151\">\n<thead data-lines=\"146,147\">\n<tr data-lines=\"146,147\">\n<th>Tratado</th>\n<th>A&#xf1;o</th>\n<th>Contenido esencial</th>\n</tr>\n</thead>\n<tbody data-lines=\"148,151\">\n<tr data-lines=\"148,149\">\n<td><strong>Paz de Utrecht</strong></td>\n<td>1713</td>\n<td>Felipe V rey; RU obtiene Gibraltar, Menorca y privilegios comerciales</td>\n</tr>\n<tr data-lines=\"149,150\">\n<td><strong>Paz de Rastadt</strong></td>\n<td>1714</td>\n<td>Espa&#xf1;a pierde posesiones europeas (Austria, Saboya)</td>\n</tr>\n<tr data-lines=\"150,151\">\n<td><strong>Paz de Versalles</strong></td>\n<td>1783</td>\n<td>Espa&#xf1;a recupera Florida y Menorca (Carlos III)</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"146,151"}}],"payload":{"tag":"h3","lines":"144,145"}}],"payload":{"tag":"h2","lines":"132,133"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. Explica las <strong>causas</strong> que originaron la Guerra de Sucesi&#xf3;n Espa&#xf1;ola y los <strong>candidatos</strong> al trono tras la muerte de Carlos II.","children":[],"payload":{"tag":"li","lines":"156,157","listIndex":1}},{"content":"2. &#xbf;Por qu&#xe9; la Guerra de Sucesi&#xf3;n fue a la vez un <strong>conflicto europeo</strong> y una <strong>guerra civil</strong>? Relaciona cada Corona con el bando que apoy&#xf3; y su modelo pol&#xed;tico.","children":[],"payload":{"tag":"li","lines":"157,158","listIndex":2}},{"content":"3. Comenta las <strong>consecuencias</strong> de la <strong>Paz de Utrecht (1713)</strong> para Espa&#xf1;a y para Reino Unido.","children":[],"payload":{"tag":"li","lines":"158,159","listIndex":3}},{"content":"4. Define y explica la importancia de los <strong>Pactos de Familia</strong> y del <strong>Sistema de Utrecht</strong> en la pol&#xed;tica exterior del siglo XVIII.","children":[],"payload":{"tag":"li","lines":"159,160","listIndex":4}},{"content":"5. Se&#xf1;ala las <strong>batallas y fechas decisivas</strong> del conflicto y explica el papel de la <strong>muerte de Jos&#xe9; I (1711)</strong> en el camino hacia la paz.","children":[],"payload":{"tag":"li","lines":"160,161","listIndex":5}}],"payload":{"tag":"h2","lines":"154,155"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
