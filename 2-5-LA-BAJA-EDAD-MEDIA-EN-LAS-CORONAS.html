>monarqu&#xed;a pactista</strong>, donde el monarca jura los<br>\nfueros y comparte el poder con las Cortes. Paralelamente, la <strong>feudalizaci&#xf3;n<br>\n(s. VIII-XIII)</strong> y el avance del r&#xe9;gimen se&#xf1;orial limitan la autoridad regia,<br>\nanticipando las tensiones entre Corona y nobleza que marcar&#xe1;n la Edad Moderna.","children":[],"payload":{"tag":"li","lines":"57,65"}}],"payload":{"tag":"h2","lines":"55,56"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Monarqu&#xed;a feudal castellana</strong> &#x2192; modelo autoritario, rey de origen divino que concentra los tres poderes","children":[],"payload":{"tag":"li","lines":"67,68"}},{"content":"<strong>Monarqu&#xed;a pactista (Arag&#xf3;n y Navarra)</strong> &#x2192; el rey jura fueros y negocia con las Cortes &#x2194; contraste con Castilla","children":[],"payload":{"tag":"li","lines":"68,69"}},{"content":"<strong>Cortes (1118 Castilla / 1274 Arag&#xf3;n)</strong> &#x2192; origen del parlamentarismo medieval peninsular","children":[],"payload":{"tag":"li","lines":"69,70"}},{"content":"<strong>Justicia de Arag&#xf3;n</strong> &#x2192; instituci&#xf3;n clave del pactismo, defensa de los fueros","children":[],"payload":{"tag":"li","lines":"70,71"}},{"content":"<strong>Feudalizaci&#xf3;n y se&#xf1;or&#xed;o (s. VIII-XIII)</strong> &#x2192; claves para entender el reparto del poder territorial","children":[],"payload":{"tag":"li","lines":"71,72"}},{"content":"<strong>Realengo</strong> &#x2192; contrapunto al se&#xf1;or&#xed;o, base del poder directo del rey","children":[],"payload":{"tag":"li","lines":"72,74"}}],"payload":{"tag":"h2","lines":"65,66"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<blockquote data-lines=\"78,79\">\n<p data-lines=\"78,79\"><strong>VASALLAJE:</strong> v&#xed;nculo de fidelidad y servicio entre un se&#xf1;or y un vasallo a cambio de protecci&#xf3;n y tierras.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"78,80"}},{"content":"\n<blockquote data-lines=\"80,81\">\n<p data-lines=\"80,81\"><strong>CURIA REGIA:</strong> consejo de nobles y eclesi&#xe1;sticos que asesoraba al rey; origen del Consejo Real y de las Cortes.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"80,82"}},{"content":"\n<blockquote data-lines=\"82,83\">\n<p data-lines=\"82,83\"><strong>CONSEJO REAL (1385):</strong> &#xf3;rgano de gobierno y asesoramiento del monarca castellano, evoluci&#xf3;n de la Curia Ordinaria.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"82,84"}},{"content":"\n<blockquote data-lines=\"84,85\">\n<p data-lines=\"84,85\"><strong>CORTES:</strong> asamblea representativa de los estamentos (nobleza, clero, ciudades) que aprobaba subsidios.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"84,86"}},{"content":"\n<blockquote data-lines=\"86,87\">\n<p data-lines=\"86,87\"><strong>SUBSIDIO:</strong> ayuda econ&#xf3;mica extraordinaria que las Cortes conced&#xed;an al rey.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"86,88"}},{"content":"\n<blockquote data-lines=\"88,89\">\n<p data-lines=\"88,89\"><strong>AUDIENCIA / CHANCILLER&#xcd;A:</strong> m&#xe1;ximo tribunal de justicia de la Corona de Castilla, fijado en Valladolid.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"88,90"}},{"content":"\n<blockquote data-lines=\"90,91\">\n<p data-lines=\"90,91\"><strong>MONARQU&#xcd;A PACTISTA:</strong> sistema en el que el poder real se basa en un pacto: el rey jura respetar los fueros.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"90,92"}},{"content":"\n<blockquote data-lines=\"92,93\">\n<p data-lines=\"92,93\"><strong>FUERO:</strong> conjunto de leyes y privilegios propios de un territorio que el rey se compromete a respetar.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"92,94"}},{"content":"\n<blockquote data-lines=\"94,95\">\n<p data-lines=\"94,95\"><strong>GENERALITAT:</strong> instituci&#xf3;n de gobierno permanente de la Corona de Arag&#xf3;n, derivada de las diputaciones de Cortes.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"94,96"}},{"content":"\n<blockquote data-lines=\"96,97\">\n<p data-lines=\"96,97\"><strong>JUSTICIA DE ARAG&#xd3;N:</strong> magistrado elegido por las Cortes encargado de velar por el cumplimiento de los fueros.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"96,98"}},{"content":"\n<blockquote data-lines=\"98,99\">\n<p data-lines=\"98,99\"><strong>SE&#xd1;OR&#xcd;O:</strong> territorio cedido por el rey a un noble o instituci&#xf3;n, con derechos econ&#xf3;micos y, desde el s. XII, jurisdiccionales.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"98,100"}},{"content":"\n<blockquote data-lines=\"100,101\">\n<p data-lines=\"100,101\"><strong>REALENGO:</strong> tierras sometidas a la autoridad y jurisdicci&#xf3;n directa del rey.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"100,102"}}],"payload":{"tag":"h2","lines":"76,77"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"<strong>Castilla = monarqu&#xed;a feudal</strong> &#x2192; rey divino &#x27f6; concentra legislativo + judicial + militar","children":[{"content":"Curia Ordinaria &#x2192; <strong>Consejo Real (1385)</strong>","children":[],"payload":{"tag":"li","lines":"107,108"}},{"content":"Curia Extraordinaria &#x2192; <strong>Cortes (1118)</strong> &#x2192; tras uni&#xf3;n <strong>1230</strong> aprueban subsidios","children":[],"payload":{"tag":"li","lines":"108,109"}},{"content":"Justicia &#x2192; <strong>Audiencia (1371)</strong> &#x2192; <strong>Chanciller&#xed;a de Valladolid (s. XV)</strong>","children":[],"payload":{"tag":"li","lines":"109,110"}}],"payload":{"tag":"li","lines":"106,110"}},{"content":"<strong>Arag&#xf3;n = monarqu&#xed;a pactista</strong> &#x2192; rey jura fueros","children":[{"content":"<strong>Cortes (1274)</strong> pactistas + diputaciones controlan subsidios","children":[],"payload":{"tag":"li","lines":"111,112"}},{"content":"<strong>Generalitat</strong> (1412 Arag&#xf3;n / 1419 Valencia)","children":[],"payload":{"tag":"li","lines":"112,113"}},{"content":"<strong>Justicia de Arag&#xf3;n</strong> &#x2192; defiende los fueros","children":[],"payload":{"tag":"li","lines":"113,114"}}],"payload":{"tag":"li","lines":"110,114"}},{"content":"<strong>Navarra = monarqu&#xed;a pactista</strong> &#x2192; instituciones mixtas","children":[{"content":"Consejo real asesor + Cortes (rey jura fueros)","children":[],"payload":{"tag":"li","lines":"115,116"}},{"content":"<strong>Diputaci&#xf3;n de los tres estados</strong> (mediados s. XV) &#x2192; recauda subsidios","children":[],"payload":{"tag":"li","lines":"116,117"}}],"payload":{"tag":"li","lines":"114,117"}},{"content":"<strong>Feudalizaci&#xf3;n (s. VIII-XIII)</strong> &#x2192; <strong>se&#xf1;or&#xed;o</strong> = territorio por servicios","children":[{"content":"Hasta s. XII &#x2192; solo econ&#xf3;mico &#x27f6; desde s. XII &#x2192; jurisdicci&#xf3;n + inmunidad","children":[],"payload":{"tag":"li","lines":"118,119"}},{"content":"Rey conserva el poder solo en el <strong>realengo</strong>","children":[],"payload":{"tag":"li","lines":"119,121"}}],"payload":{"tag":"li","lines":"117,121"}}],"payload":{"tag":"h2","lines":"104,105"}},{"content":"Tabla comparativa de los modelos pol&#xed;ticos","children":[{"content":"<table data-lines=\"125,133\">\n<thead data-lines=\"125,126\">\n<tr data-lines=\"125,126\">\n<th>Elemento</th>\n<th>Corona de Castilla</th>\n<th>Corona de Arag&#xf3;n</th>\n<th>Reino de Navarra</th>\n</tr>\n</thead>\n<tbody data-lines=\"127,133\">\n<tr data-lines=\"127,128\">\n<td><strong>Modelo de monarqu&#xed;a</strong></td>\n<td>Feudal y autoritaria</td>\n<td>Pactista</td>\n<td>Pactista</td>\n</tr>\n<tr data-lines=\"128,129\">\n<td><strong>Posici&#xf3;n del rey</strong></td>\n<td>Origen divino, concentra los poderes</td>\n<td>Jura los fueros</td>\n<td>Jura los fueros</td>\n</tr>\n<tr data-lines=\"129,130\">\n<td><strong>Cortes</strong></td>\n<td>1118 (escasa capacidad legislativa)</td>\n<td>1274 (car&#xe1;cter pactista)</td>\n<td>Rey jura fueros y leyes</td>\n</tr>\n<tr data-lines=\"130,131\">\n<td><strong>&#xd3;rgano de gobierno/control</strong></td>\n<td>Consejo Real (1385)</td>\n<td>Diputaciones / Generalitat</td>\n<td>Consejo real asesor</td>\n</tr>\n<tr data-lines=\"131,132\">\n<td><strong>Instituci&#xf3;n de justicia/fueros</strong></td>\n<td>Audiencia (1371) &#x2192; Chanciller&#xed;a</td>\n<td>Justicia de Arag&#xf3;n</td>\n<td>&#x2014;</td>\n</tr>\n<tr data-lines=\"132,133\">\n<td><strong>&#xd3;rgano fiscal</strong></td>\n<td>Cortes (subsidios)</td>\n<td>Diputaciones (subsidios)</td>\n<td>Diputaci&#xf3;n de los tres estados (s. XV)</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"125,133"}}],"payload":{"tag":"h2","lines":"123,124"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. Define y diferencia los conceptos de <strong>monarqu&#xed;a feudal</strong> y <strong>monarqu&#xed;a pactista</strong>, se&#xf1;alando a qu&#xe9; coronas corresponde cada modelo.","children":[],"payload":{"tag":"li","lines":"138,139","listIndex":1}},{"content":"2. Explica la evoluci&#xf3;n de la <strong>Curia Regia</strong> en la Corona de Castilla y las instituciones que derivan de ella.","children":[],"payload":{"tag":"li","lines":"139,140","listIndex":2}},{"content":"3. &#xbf;Qu&#xe9; funci&#xf3;n cumpl&#xed;an las <strong>Cortes</strong> en Castilla y en Arag&#xf3;n? Se&#xf1;ala las diferencias en cuanto a su capacidad de actuaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"140,141","listIndex":3}},{"content":"4. Explica el papel del <strong>Justicia de Arag&#xf3;n</strong> dentro del sistema pactista de la Corona de Arag&#xf3;n.","children":[],"payload":{"tag":"li","lines":"141,142","listIndex":4}},{"content":"5. Define <strong>se&#xf1;or&#xed;o</strong> y <strong>realengo</strong> y explica c&#xf3;mo la feudalizaci&#xf3;n (s. VIII-XIII) limit&#xf3; el poder real.","children":[],"payload":{"tag":"li","lines":"142,143","listIndex":5}},{"content":"6. Compara las instituciones de gobierno y de control fiscal de Castilla, Arag&#xf3;n y Navarra durante la Baja Edad Media.","children":[],"payload":{"tag":"li","lines":"143,144","listIndex":6}}],"payload":{"tag":"h2","lines":"136,137"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
