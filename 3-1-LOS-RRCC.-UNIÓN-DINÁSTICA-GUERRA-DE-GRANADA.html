","children":[{"content":"<strong>1469 (Matrimonio Isabel-Fernando)</strong> &#x2192; origen de la Uni&#xf3;n Din&#xe1;stica","children":[],"payload":{"tag":"li","lines":"93,94"}},{"content":"<strong>Uni&#xf3;n Din&#xe1;stica</strong> &#x2192; uni&#xf3;n de coronas sin fusi&#xf3;n territorial; concepto clave del modelo de Estado","children":[],"payload":{"tag":"li","lines":"94,95"}},{"content":"<strong>Monarqu&#xed;a autoritaria</strong> &#x2192; contraste Castilla (centralista) &#x2194; Arag&#xf3;n (pactista)","children":[],"payload":{"tag":"li","lines":"95,96"}},{"content":"<strong>1492</strong> &#x2192; a&#xf1;o clave: rendici&#xf3;n de Granada + expulsi&#xf3;n de los jud&#xed;os","children":[],"payload":{"tag":"li","lines":"96,97"}},{"content":"<strong>Guerra de Granada (1481-1492)</strong> &#x2192; fin de la Reconquista y de Al-&#xc1;ndalus","children":[],"payload":{"tag":"li","lines":"97,98"}},{"content":"<strong>Capitulaciones incumplidas</strong> &#x2192; germen del problema morisco (revueltas de las Alpujarras)","children":[],"payload":{"tag":"li","lines":"98,100"}}],"payload":{"tag":"h2","lines":"91,92"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<blockquote data-lines=\"104,105\">\n<p data-lines=\"104,105\"><strong>Capitulaciones de Cervera (1469):</strong> acuerdo matrimonial que fij&#xf3; las condiciones del enlace entre Isabel y Fernando.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"104,106"}},{"content":"\n<blockquote data-lines=\"106,107\">\n<p data-lines=\"106,107\"><strong>Uni&#xf3;n Din&#xe1;stica:</strong> uni&#xf3;n de Castilla y Arag&#xf3;n bajo unos mismos reyes, conservando cada reino sus leyes, instituciones y fronteras.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"106,108"}},{"content":"\n<blockquote data-lines=\"108,109\">\n<p data-lines=\"108,109\"><strong>Monarqu&#xed;a autoritaria:</strong> modelo pol&#xed;tico que refuerza el poder real frente a nobleza, Iglesia y ciudades, <em>sin</em> llegar al absolutismo posterior.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"108,110"}},{"content":"\n<blockquote data-lines=\"110,111\">\n<p data-lines=\"110,111\"><strong>Cortes pactistas:</strong> las de Arag&#xf3;n, que negociaban con el rey y limitaban su poder (<em>pactismo</em>) &#x2194; las consultivas de Castilla.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"110,112"}},{"content":"\n<blockquote data-lines=\"112,113\">\n<p data-lines=\"112,113\"><strong>Justicia (Mayor de Arag&#xf3;n):</strong> instituci&#xf3;n aragonesa que defend&#xed;a los <em>fueros</em> frente a los abusos del monarca.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"112,114"}},{"content":"\n<blockquote data-lines=\"114,115\">\n<p data-lines=\"114,115\"><strong>Consejos:</strong> &#xf3;rganos colegiados de asesoramiento y gobierno por materias o territorios.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"114,116"}},{"content":"\n<blockquote data-lines=\"116,117\">\n<p data-lines=\"116,117\"><strong>Santa Hermandad:</strong> cuerpo armado para el mantenimiento del orden p&#xfa;blico en los caminos y zonas rurales.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"116,118"}},{"content":"\n<blockquote data-lines=\"118,119\">\n<p data-lines=\"118,119\"><strong>Inquisici&#xf3;n:</strong> tribunal religioso (1478) destinado a vigilar la pureza de la fe y perseguir la herej&#xed;a.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"118,120"}},{"content":"\n<blockquote data-lines=\"120,121\">\n<p data-lines=\"120,121\"><strong>Corregidor:</strong> delegado real enviado a los municipios para controlar el gobierno local.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"120,122"}},{"content":"\n<blockquote data-lines=\"122,123\">\n<p data-lines=\"122,123\"><strong>Reino nazar&#xed;:</strong> &#xfa;ltimo Estado musulm&#xe1;n de la Pen&#xed;nsula (Granada), conquistado en 1492.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"122,124"}},{"content":"\n<blockquote data-lines=\"124,125\">\n<p data-lines=\"124,125\"><strong>Morisco:</strong> musulm&#xe1;n que permanece en territorio cristiano tras la conquista (<em>convertido o no</em>).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"124,126"}},{"content":"\n<blockquote data-lines=\"126,127\">\n<p data-lines=\"126,127\"><strong>Boabdil:</strong> <em>Muhammad XII</em>, &#xfa;ltimo rey nazar&#xed; de Granada, rendido el 2 de enero de 1492.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"126,128"}}],"payload":{"tag":"h2","lines":"102,103"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"","children":[{"content":"<strong>1469</strong> &#x2192; boda Isabel &#x2194; Fernando (<em>Capitulaciones de Cervera</em>)","children":[],"payload":{"tag":"li","lines":"134,135"}},{"content":"<strong>1476</strong> &#x2192; batalla de Toro (victoria isabelina) &#xb7; <strong>1479</strong> &#x2192; Tratado de Alca&#xe7;ovas + Fernando rey de Arag&#xf3;n","children":[],"payload":{"tag":"li","lines":"135,136"}},{"content":"&#x27f6; <strong>Uni&#xf3;n Din&#xe1;stica</strong> &#x2192; misma corona, <em>distintas instituciones</em>","children":[],"payload":{"tag":"li","lines":"136,138"}}],"payload":{"tag":"ul","lines":"134,138"}},{"content":"","children":[{"content":"<strong>Castilla</strong> &#x2192; Cortes consultivas &#xb7; rey legisla &#xb7; audiencias y chanciller&#xed;as","children":[],"payload":{"tag":"li","lines":"139,140"}},{"content":"<strong>Arag&#xf3;n</strong> &#x2192; Cortes pactistas &#xb7; poder compartido &#xb7; <em>Justicia</em> y fueros","children":[],"payload":{"tag":"li","lines":"140,141"}},{"content":"<strong>Instituciones comunes</strong> &#x2192; <strong>Consejos &#xb7; Santa Hermandad &#xb7; Inquisici&#xf3;n &#xb7; Contadur&#xed;as &#xb7; Corregidores</strong>","children":[],"payload":{"tag":"li","lines":"141,143"}}],"payload":{"tag":"ul","lines":"139,143"}},{"content":"","children":[{"content":"Expulsi&#xf3;n de los jud&#xed;os","children":[],"payload":{"tag":"li","lines":"144,145"}},{"content":"Conquista de Granada","children":[],"payload":{"tag":"li","lines":"145,147"}}],"payload":{"tag":"ul","lines":"144,147"}},{"content":"","children":[{"content":"\n<p data-lines=\"148,149\"><strong>1481 Zahara</strong> &#x2192; <strong>1485-87 M&#xe1;laga</strong> &#x2192; Moj&#xe1;car / Guadix / Almer&#xed;a &#x2192; <strong>2 enero 1492 rendici&#xf3;n</strong></p>","children":[],"payload":{"tag":"li","lines":"148,149"}},{"content":"\n<p data-lines=\"149,150\"><strong>Guerra interna nazar&#xed;:</strong> <em>Mulay-Hacem &#xb7; El Zagal &#xb7; Boabdil</em></p>","children":[],"payload":{"tag":"li","lines":"149,150"}},{"content":"\n<p data-lines=\"150,151\"><strong>Capitulaciones incumplidas</strong> &#x2192; revueltas de las <strong>Alpujarras</strong> (Felipe II)</p>","children":[],"payload":{"tag":"li","lines":"150,152"}},{"content":"\n<p data-lines=\"152,153\"><strong>3 FECHAS QUE NO PUEDES FALLAR:</strong> 1469 &#xb7; 1479 &#xb7; 1492</p>","children":[],"payload":{"tag":"li","lines":"152,154"}}],"payload":{"tag":"ul","lines":"148,154"}}],"payload":{"tag":"h2","lines":"130,131"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. Explica el origen y el significado de la <strong>Uni&#xf3;n Din&#xe1;stica</strong> entre Castilla y Arag&#xf3;n. &#xbf;Implic&#xf3; la fusi&#xf3;n de ambos reinos? Justifica tu respuesta.","children":[],"payload":{"tag":"li","lines":"158,160","listIndex":1}},{"content":"2. Compara el funcionamiento de las <strong>Cortes</strong> y del <strong>poder legislativo y judicial</strong> en Castilla y en Arag&#xf3;n bajo los Reyes Cat&#xf3;licos.","children":[],"payload":{"tag":"li","lines":"160,162","listIndex":2}},{"content":"3. Enumera y define las principales <strong>instituciones de gobierno</strong> creadas o reforzadas por los Reyes Cat&#xf3;licos
