</em> la extendi&#xf3; a todos los libres (siglo III).</p>","children":[],"payload":{"tag":"li","lines":"96,98"}},{"content":"\n<p data-lines=\"98,99\"><strong>GUERRAS CELTIB&#xc9;RICAS:</strong> conflictos en el centro peninsular contra los celt&#xed;beros; s&#xed;mbolo final = <em>Numancia (133 a.C.)</em>.</p>","children":[],"payload":{"tag":"li","lines":"98,100"}},{"content":"\n<p data-lines=\"100,101\"><strong>GUERRAS C&#xc1;NTABRAS:</strong> &#xfa;ltimas campa&#xf1;as (29-19 a.C.) bajo <em>Augusto</em> que completaron la conquista del norte.</p>","children":[],"payload":{"tag":"li","lines":"100,102"}},{"content":"\n<p data-lines=\"102,103\"><strong>IT&#xc1;LICA:</strong> ciudad de la Ba&#xe9;tica, cuna de los emperadores Trajano y Adriano (ejemplo de romanizaci&#xf3;n).</p>","children":[],"payload":{"tag":"li","lines":"102,104"}}],"payload":{"tag":"h2","lines":"88,89"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"\n<p data-lines=\"108,109\"><strong>&#xbf;Qu&#xe9; fue?</strong> Conquista e integraci&#xf3;n de la Pen&#xed;nsula Ib&#xe9;rica en el Imperio romano (218 a.C.-siglo V d.C.).</p>","children":[],"payload":{"tag":"li","lines":"108,110"}},{"content":"\n<p data-lines=\"110,111\"><strong>Conquista &#x2192; 3 fases</strong></p>","children":[{"content":"<strong>218-197 a.C.</strong> &#x2192; este y sur (2&#xaa; G. P&#xfa;nica) &#xb7; <em>Ilipa (206)</em>","children":[],"payload":{"tag":"li","lines":"111,112"}},{"content":"<strong>155-133 a.C.</strong> &#x2192; centro y oeste &#xb7; <em>Viriato</em> + <em>Numancia (133)</em>","children":[],"payload":{"tag":"li","lines":"112,113"}},{"content":"<strong>29-19 a.C.</strong> &#x2192; norte &#xb7; <em>Guerras c&#xe1;ntabras (Augusto)</em>","children":[],"payload":{"tag":"li","lines":"113,115"}}],"payload":{"tag":"li","lines":"110,115"}},{"content":"\n<p data-lines=\"115,116\"><strong>Provincias de Augusto</strong></p>","children":[{"content":"<strong>Tarraconensis</strong> &#x2192; cap. <em>Tarraco</em>","children":[],"payload":{"tag":"li","lines":"116,117"}},{"content":"<strong>Lusitania</strong> &#x2192; cap. <em>Emerita Augusta</em>","children":[],"payload":{"tag":"li","lines":"117,118"}},{"content":"<strong>Ba&#xe9;tica</strong> &#x2192; cap. <em>Corduba</em>","children":[],"payload":{"tag":"li","lines":"118,120"}}],"payload":{"tag":"li","lines":"115,120"}},{"content":"\n<p data-lines=\"120,121\"><strong>Reformas:</strong> <em>Diocleciano (298)</em> &#x2192; Gallaecia + Cartaginense &#xb7; <em>siglo IV</em> &#x2192; Bale&#xe1;rica</p>","children":[],"payload":{"tag":"li","lines":"120,122"}},{"content":"\n<p data-lines=\"122,123\"><strong>Romanizaci&#xf3;n:</strong> derecho romano + lat&#xed;n + polite&#xed;smo &#x2192; cristianismo (s. I) &#x2192; <em>Caracalla</em> (ciudadan&#xed;a, s. III)</p>","children":[],"payload":{"tag":"li","lines":"122,124"}},{"content":"\n<p data-lines=\"124,125\"><strong>Huella:</strong> calzadas &#xb7; acueductos (<em>Segovia, M&#xe9;rida</em>) &#xb7; derecho &#xb7; cultura cl&#xe1;sica</p>","children":[],"payload":{"tag":"li","lines":"124,126"}}],"payload":{"tag":"h2","lines":"106,107"}},{"content":"Tabla comparativa de las fases de la conquista","children":[{"content":"<table data-lines=\"133,138\">\n<thead data-lines=\"133,134\">\n<tr data-lines=\"133,134\">\n<th>Fase</th>\n<th>Cronolog&#xed;a</th>\n<th>Territorio</th>\n<th>Conflicto / Hito clave</th>\n</tr>\n</thead>\n<tbody data-lines=\"135,138\">\n<tr data-lines=\"135,136\">\n<td>Primera</td>\n<td>218-197 a.C.</td>\n<td>Este y sur</td>\n<td>2&#xaa; Guerra P&#xfa;nica &#xb7; <em>Ilipa (206 a.C.)</em></td>\n</tr>\n<tr data-lines=\"136,137\">\n<td>Segunda</td>\n<td>155-133 a.C.</td>\n<td>Centro y oeste</td>\n<td>Guerras lusitanas (<em>Viriato</em>) y celtib&#xe9;ricas &#xb7; <em>Numancia (133 a.C.)</em></td>\n</tr>\n<tr data-lines=\"137,138\">\n<td>Tercera</td>\n<td>29-19 a.C.</td>\n<td>Norte</td>\n<td>Guerras c&#xe1;ntabras (<em>Augusto</em>)</td>\n</tr>\n</tbody>\n</tab
