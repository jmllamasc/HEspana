:"Destac&#xf3; por su <strong>crecimiento agrario, comercial e industrial</strong>","children":[],"payload":{"tag":"li","lines":"38,39"}},{"content":"Especial desarrollo del <strong>sector textil</strong> &#x27f6; base del futuro despegue industrial","children":[],"payload":{"tag":"li","lines":"39,41"}}],"payload":{"tag":"h3","lines":"36,37"}}],"payload":{"tag":"h2","lines":"21,22"}},{"content":"C. La Cultura: La Ilustraci&#xf3;n","children":[{"content":"La <strong>Ilustraci&#xf3;n</strong> inspir&#xf3; las reformas del siglo","children":[],"payload":{"tag":"li","lines":"45,46"}},{"content":"Difusi&#xf3;n a trav&#xe9;s de","children":[{"content":"<strong>Academias</strong> (Lengua, Historia, Bellas Artes)","children":[],"payload":{"tag":"li","lines":"47,48"}},{"content":"<strong>Sociedades Econ&#xf3;micas</strong> de Amigos del Pa&#xed;s","children":[],"payload":{"tag":"li","lines":"48,49"}},{"content":"Prensa y centros educativos","children":[],"payload":{"tag":"li","lines":"49,50"}}],"payload":{"tag":"li","lines":"46,50"}},{"content":"Intelectuales destacados","children":[{"content":"<strong>Jovellanos</strong> &#x2192; reformas econ&#xf3;micas y agrarias","children":[],"payload":{"tag":"li","lines":"51,52"}},{"content":"<strong>Feijoo</strong> &#x2192; cr&#xed;tica a supersticiones, esp&#xed;ritu racional","children":[],"payload":{"tag":"li","lines":"52,53"}},{"content":"<strong>Samaniego</strong> &#x2192; f&#xe1;bulas de intenci&#xf3;n <em>did&#xe1;ctica</em>","children":[],"payload":{"tag":"li","lines":"53,55"}}],"payload":{"tag":"li","lines":"50,55"}}],"payload":{"tag":"h2","lines":"43,44"}},{"content":"D. El Despotismo Ilustrado","children":[{"content":"\n<blockquote data-lines=\"59,60\">\n<p data-lines=\"59,60\"><strong>DESPOTISMO ILUSTRADO:</strong> pr&#xe1;ctica pol&#xed;tica que aplica reformas ilustradas sin renunciar al poder absoluto &#x2192; <strong>&quot;Todo para el pueblo, pero sin el pueblo&quot;</strong>.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"59,61"}},{"content":"\n<p data-lines=\"61,62\">No elimina el <strong>Antiguo R&#xe9;gimen</strong></p>","children":[],"payload":{"tag":"li","lines":"61,62"}},{"content":"\n<p data-lines=\"62,63\"><strong>Carlos III (1759-1788)</strong> &#x2192; modernizaci&#xf3;n del pa&#xed;s</p>","children":[{"content":"Reformas urbanas, agrarias, comerciales, educativas y militares","children":[],"payload":{"tag":"li","lines":"63,64"}}],"payload":{"tag":"li","lines":"62,64"}},{"content":"\n<p data-lines=\"64,65\"><strong>Mot&#xed;n de Esquilache (1766)</strong> &#x2192; oposici&#xf3;n a las reformas</p>","children":[{"content":"Causas &#x2192; subida del precio del <strong>pan</strong> &#x2194; guerra con Reino Unido","children":[],"payload":{"tag":"li","lines":"65,66"}},{"content":"Consecuencia &#x2192; <strong>expulsi&#xf3;n de los jesuitas</strong>","children":[],"payload":{"tag":"li","lines":"66,67"}}],"payload":{"tag":"li","lines":"64,67"}},{"content":"\n<p data-lines=\"67,68\"><em>Regalismo</em> &#x2192; imposici&#xf3;n del poder <strong>civil</strong> sobre el poder <strong>religioso</strong></p>","children":[],"payload":{"tag":"li","lines":"67,69"}}],"payload":{"tag":"h2","lines":"57,58"}},{"content":"Conclusi&#xf3;n","children":[{"content":"El siglo XVIII espa&#xf1;ol combin&#xf3; una econom&#xed;a agraria atrasada con un ambicioso programa de<br>\nreformas inspirado en la <strong>Ilustraci&#xf3;n</strong> y aplicado mediante el <strong>despotismo ilustrado</strong> de<br>\n<strong>Carlos III</strong>. Aunque las medidas fueron limitadas y no alteraron el <strong>Antiguo R&#xe9;gimen</strong><br>\nsentaron las bases de cambios futuros, especialmente el despegue industrial de<br>\n<strong>Catalu&#xf1;a</strong>. La resistencia a las reformas (<strong>mot&#xed;n de Esquilache</strong>) evidenci&#xf3; las<br>\ntensiones entre modernizaci&#xf3;n y privilegio estamental.","children":[],"payload":{"tag":"li","lines":"73,80"}}],"payload":{"tag":"h2","lines":"71,72"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Despotismo ilustrado</strong> &#x2192; modelo pol&#xed;tico clave del siglo: reforma sin participaci&#xf3;n popular","children":[],"payload":{"tag":"li","lines":"82,83"}},{"content":"<strong>Carlos III (1759-1788)</strong> &#x2192; monarca reformista por excelencia","children":[],"payload":{"tag":"li","lines":"83,84"}},{"content":"<strong>Informe sobre la Ley Agraria (Jovellanos)</strong> &#x2192; diagn&#xf3;stico ilustrado del atraso agrario","children":[],"payload":{"tag":"li","lines":"84,85"}},{"content":"<strong>Mot&#xed;n de Esquilache (1766)</strong> &#x2192; reacci&#xf3;n contra las reformas y antesala de la expulsi&#xf3;n jesuita","children":[],"payload":{"tag":"li","lines":"85,86"}},{"content":"<strong>Decretos de comercio con Am&#xe9;rica (1765 y 1778)</strong> &#x2192; liberalizaci&#xf3;n comercial","children":[],"payload":{"tag":"li","lines":"86,87"}},{"content":"<strong>Catalu&#xf1;a y el sector textil</strong> &#x2192; germen de la futura industrializaci&#xf3;n","children":[],"payload":{"tag":"li","lines":"87,89"}}],"payload":{"tag":"h2","lines":"80,81"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<blockquote data-lines=\"93,94\">\n<p data-lines=\"93,94\"><strong>AMORTIZACI&#xd3;N:</strong> situaci&#xf3;n jur&#xed;dica de tierras vinculadas a la nobleza, Iglesia o municipios que NO pueden venderse ni dividirse &#x2192; tierra &quot;muerta&quot; para el mercado.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"93,95"}},{"content":"\n<blockquote data-lines=\"95,96\">\n<p data-lines=\"95,96\"><strong>DESAMORTIZACI&#xd3;N:</strong> proceso de poner en venta tierras amortizadas para incorporarlas al mercado libre.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"95,97"}},{"content":"\n<blockquote data-lines=\"97,98\">\n<p data-lines=\"97,98\"><strong>CRISIS DE SUBSISTENCIA:</strong> carest&#xed;a generalizada por malas cosechas &#x2192; subida de precios, hambre y aumento de la mortalidad.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"97,99"}},{"content":"\n<blockquote data-lines=\"99,100\">\n<p data-lines=\"99,100\"><strong>MESTA:</strong> poderosa asociaci&#xf3;n de ganaderos trashumantes con privilegios sobre el uso de pastos y rutas; las reformas redujeron su poder.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"99,101"}},{"content":"\n<blockquote data-lines=\"101,102\">\n<p data-lines=\"101,102\"><strong>REALES F&#xc1;BRICAS:</strong> manufacturas creadas y financiadas por la Corona para productos de lujo o estrat&#xe9;gicos (vidrio, tapices, porcelana).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"101,103"}},{"content":"\n<blockquote data-lines=\"103,104\">\n<p data-lines=\"103,104\"><strong>GREMIO:</strong> corporaci&#xf3;n que controlaba un oficio y su producci&#xf3;n; su monopolio se rompi&#xf3; en <strong>1772</strong>.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"103,105"}},{"content":"\n<blockquote data-lines=\"105,106\">\n<p data-lines=\"105,106\"><strong>POL&#xcd;TICA PROTECCIONISTA:</strong> medidas que protegen la producci&#xf3;n nacional frente a la competencia extranjera (aranceles, prohibiciones).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"105,107"}},{"content":"\n<blockquote data-lines=\"107,108\">\n<p data-lines=\"107,108\"><strong>BANCO DE SAN CARLOS:</strong> primer banco nacional (1782), antecedente del Banco de Espa&#xf1;a; financi&#xf3; al Estado y dinamiz&#xf3; el comercio.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"107,109"}},{"content":"\n<blockquote data-lines=\"109,110\">\n<p data-lines=\"109,110\"><strong>ILUSTRACI&#xd3;N:</strong> movimiento intelectual del siglo XVIII que conf&#xed;a en la raz&#xf3;n, el progreso y la educaci&#xf3;n para reformar la sociedad.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"109,111"}},{"content":"\n<blockquote data-lines=\"111,112\">\n<p data-lines=\"111,112\"><strong>SOCIEDADES ECON&#xd3;MICAS DE AMIGOS DEL PA&#xcd;S:</strong> asociaciones ilustradas que promov&#xed;an la agricultura, la industria y la difusi&#xf3;n del conocimiento &#xfa;til.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"111,113"}},{"content":"\n<blockquote data-lines=\"113,114\">\n<p data-lines=\"113,114\"><strong>DESPOTISMO ILUSTRADO:</strong> forma de absolutismo reformista: el monarca aplica mejoras &quot;para el pueblo&quot; sin cederle poder pol&#xed;tico.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"113,115"}},{"content":"\n<blockquote data-lines=\"115,116\">\n<p data-lines=\"115,116\"><strong>REGALISMO:</strong> doctrina que defiende la supremac&#xed;a del poder civil (el rey) sobre el poder eclesi&#xe1;stico.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"115,117"}},{"content":"\n<blockquote data-lines=\"117,118\">\n<p data-lines=\"117,118\"><strong>ANTIGUO R&#xc9;GIMEN:</strong> sistema pol&#xed;tico, social y econ&#xf3;mico previo a las revoluciones liberales: monarqu&#xed;a absoluta, sociedad estamental y econom&#xed;a agraria se&#xf1;orial.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"117,119"}}],"payload":{"tag":"h2","lines":"91,92"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"\n<p data-lines=\"125,126\"><strong>Econom&#xed;a</strong> &#x2192; agraria, atrasada, amortizada. Reformas: <em>Informe Ley Agraria</em> (Jovellanos), reparto comunal, Sierra Morena, freno a la Mesta, regad&#xed;os.</p>","children":[],"payload":{"tag":"li","lines":"125,126"}},{"content":"\n<p data-lines=\"126,127\"><strong>Industria</strong> &#x2192; reales f&#xe1;bricas + fin del gremio (<strong>1772</strong>) + proteccionismo. <em>Pero</em> poca competitividad.</p>","children":[],"payload":{"tag":"li","lines":"126,127"}},{"content":"\n<p data-lines=\"127,128\"><strong>Comercio</strong> &#x2192; <strong>Banco de San Carlos</strong>, fin de aduanas interiores, apertura a Am&#xe9;rica (<strong>1765 y 1778</strong>).</p>","children":[],"payload":{"tag":"li","lines":"127,128"}},{"content":"\n<p data-lines=\"128,129\"><strong>Catalu&#xf1;a</strong> &#x2192; motor textil &#x27f6; semilla de la industrializaci&#xf3;n.</p>","children":[],"payload":{"tag":"li","lines":"128,129"}},{"content":"\n<p data-lines=\"129,130\"><strong>Cultura</strong> &#x2192; <strong>Ilustraci&#xf3;n</strong>: Academias, Sociedades Econ&#xf3;micas, prensa. Figuras: <strong>Jovellanos, Feijoo, Samaniego</strong>.</p>","children":[],"payload":{"tag":"li","lines":"129,130"}},{"content":"\n<p data-lines=\"130,131\"><strong>Pol&#xed;tica</strong> &#x2192; <strong>Despotismo ilustrado</strong>: <em>&quot;Todo para el pueblo, pero sin el pueblo&quot;</em>. <strong>Carlos III (1759-1788)</strong> reformista.</p>","children":[],"payload":{"tag":"li","lines":"130,131"}},{"content":"\n<p data-lines=\"131,132\"><strong>Conflicto clave</strong> &#x2192; <strong>Mot&#xed;n de Esquilache (1766)</strong> &#x2192; expulsi&#xf3;n de los <strong>jesuitas</strong> (regalismo).</p>","children":[],"payload":{"tag":"li","lines":"131,133"}},{"content":"\n<p data-lines=\"133,134\"><strong>Idea-fuerza &#x2192;</strong> reformas amplias <strong>pero limitadas</strong> &#x2192; no se rompe el <strong>Antiguo R&#xe9;gimen</strong>.</p>","children":[],"payload":{"tag":"li","lines":"133,135"}}],"payload":{"tag":"h2","lines":"121,122"}},{"content":"Tabla comparativa: &#xe1;mbitos de reforma de Carlos III","children":[{"content":"<table data-lines=\"139,146\">\n<thead data-lines=\"139,140\">\n<tr data-lines=\"139,140\">\n<th>&#xc1;mbito</th>\n<th>Principales medidas</th>\n<th>Objetivo</th>\n<th>Limitaci&#xf3;n / resultado</th>\n</tr>\n</thead>\n<tbody data-lines=\"141,146\">\n<tr data-lines=\"141,142\">\n<td><strong>Agrario</strong></td>\n<td>Informe Ley Agraria, reparto comunal, Sierra Morena, freno a la Mesta, regad&#xed;os</td>\n<td>Aumentar producci&#xf3;n y acceso a la tierra</td>\n<td>Medidas parciales; persiste la amortizaci&#xf3;n</td>\n</tr>\n<tr data-lines=\"142,143\">\n<td><strong>Industrial</strong></td>\n<td>Reales f&#xe1;bricas, fin del monopolio gremial (1772), proteccionismo</td>\n<td>Modernizar la producci&#xf3;n</td>\n<td>Falta de competitividad frena el desarrollo</td>\n</tr>\n<tr data-lines=\"143,144\">\n<td><strong>Comercial</strong></td>\n<td>Banco de San Carlos, supresi&#xf3;n de aduanas, decretos de Am&#xe9;rica (1765, 1778)</td>\n<td>Dinamizar el comercio interior y colonial</td>\n<td>Catalu&#xf1;a s&#xed; despega; resto desigual</td>\n</tr>\n<tr data-lines=\"144,145\">\n<td><strong>Cultural</strong></td>\n<td>Academias, Sociedades Econ&#xf3;micas, prensa, educaci&#xf3;n</td>\n<td>Difundir la Ilustraci&#xf3;n</td>\n<td>Reformismo desde arriba, alcance social limitado</td>\n</tr>\n<tr data-lines=\"145,146\">\n<td><strong>Pol&#xed;tico-religioso</strong></td>\n<td>Regalismo, expulsi&#xf3;n de jesuitas (1767)</td>\n<td>Reforzar poder civil sobre la Iglesia</td>\n<td>Mantiene el Antiguo R&#xe9;gimen</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"139,146"}}],"payload":{"tag":"h2","lines":"137,138"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. Explica las caracter&#xed;sticas de la <strong>econom&#xed;a agraria</strong> espa&#xf1;ola del siglo XVIII y las <strong>reformas</strong> propuestas para mejorarla.","children":[],"payload":{"tag":"li","lines":"151,152","listIndex":1}},{"content":"2. Define el concepto de <strong>despotismo ilustrado</strong> y relaci&#xf3;nalo con el reinado de <strong>Carlos III</strong>.","children":[],"payload":{"tag":"li","lines":"152,153","listIndex":2}},{"content":"3. &#xbf;Qu&#xe9; fue el <strong>mot&#xed;n de Esquilache (1766)</strong>? Exp&#xf3;n sus causas y consecuencias.","children":[],"payload":{"tag":"li","lines":"153,154","listIndex":3}},{"content":"4. Analiza el papel de la <strong>Ilustraci&#xf3;n</strong> en Espa&#xf1;a: instituciones de difusi&#xf3;n y principales intelectuales.","children":[],"payload":{"tag":"li","lines":"154,155","listIndex":4}},{"content":"5. Explica las medidas adoptadas para impulsar la <strong>industria</strong> y el <strong>comercio</strong>, y por qu&#xe9; tuvieron un &#xe9;xito limitado.","children":[],"payload":{"tag":"li","lines":"155,156","listIndex":5}},{"content":"6. &#xbf;Por qu&#xe9; destac&#xf3; <strong>Catalu&#xf1;a</strong> en el desarrollo econ&#xf3;mico del siglo XVIII? Relaci&#xf3;nalo con la futura industrializaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"156,157","listIndex":6}},{"content":"7. Define <strong>regalismo</strong> y explica c&#xf3;mo se manifest&#xf3; en la pol&#xed;tica de Carlos III.","children":[],"payload":{"tag":"li","lines":"157,158","listIndex":7}},{"content":"8. Comenta el significado de la frase <strong>&quot;Todo para el pueblo, pero sin el pueblo&quot;</strong> en el contexto del reformismo borb&#xf3;nico.","children":[],"payload":{"tag":"li","lines":"158,159","listIndex":8}}],"payload":{"tag":"h2","lines":"149,150"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
