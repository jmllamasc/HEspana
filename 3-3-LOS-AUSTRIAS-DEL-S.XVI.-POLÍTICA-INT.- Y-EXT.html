            })(() => window.markmap,null,{"content":"A3.3. Los Austrias del Siglo XVI. Pol&#xed;tica Interior y Exterior","children":[{"content":"A. El Origen de la Casa de Austria","children":[{"content":"\n<p data-lines=\"4,5\">Tras la muerte de <strong>Isabel (1504)</strong> y <strong>Fernando (1516)</strong> &#x2192; se <em>extingue</em> la <strong>dinast&#xed;a Trast&#xe1;mara</strong></p>","children":[],"payload":{"tag":"li","lines":"4,5"}},{"content":"\n<p data-lines=\"5,6\">Comienza la <strong>Casa de Austria</strong> con <strong>Carlos I (1516-1556)</strong></p>","children":[],"payload":{"tag":"li","lines":"5,6"}},{"content":"\n<p data-lines=\"6,7\">Heredero de <strong>vastos territorios</strong></p>","children":[{"content":"<strong>Reinos hispanos</strong>","children":[],"payload":{"tag":"li","lines":"7,8"}},{"content":"<strong>Franco Condado</strong>","children":[],"payload":{"tag":"li","lines":"8,9"}},{"content":"<strong>Pa&#xed;ses Bajos</strong>","children":[],"payload":{"tag":"li","lines":"9,10"}},{"content":"<strong>Luxemburgo</strong>","children":[],"payload":{"tag":"li","lines":"10,11"}},{"content":"<strong>Austria</strong>","children":[],"payload":{"tag":"li","lines":"11,12"}},{"content":"La <strong>dignidad imperial</strong>","children":[],"payload":{"tag":"li","lines":"12,14"}}],"payload":{"tag":"li","lines":"6,14"}},{"content":"\n<blockquote data-lines=\"14,15\">\n<p data-lines=\"14,15\"><strong>UNI&#xd3;N DE ESTADOS &#x2192;</strong> monarqu&#xed;a de varios reinos con autonom&#xed;a interna bajo un mismo soberano.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"14,16"}}],"payload":{"tag":"h2","lines":"2,3"}},{"content":"B. Pol&#xed;tica Interior","children":[{"content":"1. Reinado de Carlos I (1516-1556)","children":[{"content":"<strong>Revuelta de las Comunidades (1520-1522)</strong>","children":[{"content":"L&#xed;deres &#x2192; <strong>Bravo</strong> - <strong>Padilla</strong> y <strong>Maldonado</strong>","children":[],"p ],"payload":{"tag":"h2","lines":"43,44"}},{"content":"Conclusi&#xf3;n","children":[{"content":"El siglo XVI marca la <strong>hegemon&#xed;a hisp&#xe1;nica</strong> bajo los Austrias<br>\nMayores. <strong>Carlos I</strong> consolid&#xf3; un imperio universal y defendi&#xf3; el<br>\ncatolicismo frente a Francia, el turco y los protestantes;<br>\n<strong>Felipe II</strong> reforz&#xf3; la centralizaci&#xf3;n administrativa y la unidad<br>\npeninsular con la anexi&#xf3;n de <strong>Portugal (1581)</strong>. La derrota de la<br>\n<strong>Armada Invencible (1588)</strong> anuncia el fin del esplendor y el inicio<br>\nde la decadencia que se agravar&#xe1; en el siglo XVII.","children":[],"payload":{"tag":"li","lines":"66,74"}}],"payload":{"tag":"h2","lines":"64,65"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Carlos I (1516-1556)</strong> &#x2192; inicio de la Casa de Austria y la monarqu&#xed;a universal","children":[],"payload":{"tag":"li","lines":"76,77"}},{"content":"<strong>Villalar (1521)</strong> &#x2192; fin de las Comunidades &#x27f6; refuerzo del poder real","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"<strong>Sistema polisinodial</strong> &#x2192; modelo administrativo de los Austrias","children":[],"payload":{"tag":"li","lines":"78,79"}},{"content":"<strong>Cortes de Tomar (1581)</strong> &#x2192; unidad ib&#xe9;rica bajo Felipe II","children":[],"payload":{"tag":"li","lines":"79,80"}},{"content":"<strong>Lepanto (1571)</strong> &#x2192; freno al expansionismo turco en el Mediterr&#xe1;neo","children":[],"payload":{"tag":"li","lines":"80,81"}},{"content":"<strong>Armada Invencible (1588)</strong> &#x2192; inicio de la decadencia hisp&#xe1;nica","children":[],"payload":{"tag":"li","lines":"81,83"}}],"payload":{"tag":"h2","lines":"74,75"}},{"content":"Glosario","children":[{"content":"\n<blockquote data-lines=\"87,88\">\n<p data-lines=\"87,88\"><strong>CASA DE AUSTRIA (HABSBURGO):</strong> dinast&#xed;a que reina en Espa&#xf1;a (1516-1700); en el s. XVI los <em>Austrias Mayores</em> (Carlos I y Felipe II).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"87,89"}},{"content":"\n<blockquote data-lines=\"89,90\">\n<p data-lines=\"89,90\"><strong>UNI&#xd3;N DE ESTADOS:</strong> modelo de monarqu&#xed;a compuesta por reinos que conservan sus leyes e instituciones bajo un soberano com&#xfa;n.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"89,91"}},{"content":"\n<blockquote data-lines=\"91,92\">\n<p data-lines=\"91,92\"><strong>COMUNIDADES:</strong> revuelta de las ciudades castellanas (1520-1522) contra los impuestos y la presencia de cargos extranjeros de Carlos I.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"91,93"}},{"content":"\n<blockquote data-lines=\"93,94\">\n<p data-lines=\"93,94\"><strong>GERMAN&#xcd;AS:</strong> revueltas de artesanos y gremios en Valencia y Mallorca, de car&#xe1;cter social y antise&#xf1;orial.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"93,95"}},{"content":"\n<blockquote data-lines=\"95,96\">\n<p data-lines=\"95,96\"><strong>SISTEMA POLISINODIAL:</strong> forma de gobierno basada en <em>Consejos</em> (tem&#xe1;ticos y territoriales) que asesoran al rey.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"95,97"}},{"content":"\n<blockquote data-lines=\"97,98\">\n<p data-lines=\"97,98\"><strong>CONSEJO:</strong> &#xf3;rgano colegiado de asesoramiento del monarca, especializado por materia o territorio.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"97,99"}},{"content":"\n<blockquote data-lines=\"99,100\">\n<p data-lines=\"99,100\"><strong>VIRREY:</strong> representante del rey con plenos poderes en un territorio de la monarqu&#xed;a (excepto Castilla).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"99,101"}},{"content":"\n<blockquote data-lines=\"101,102\">\n<p data-lines=\"101,102\"><strong>MORISCOS:</strong> musulmanes convertidos al cristianismo tras la conquista; protagonizan la rebeli&#xf3;n de las Alpujarras.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"101,103"}},{"content":"\n<blockquote data-lines=\"103,104\">\n<p data-lines=\"103,104\"><strong>LIGA SANTA:</strong> alianza cristiana (Espa&#xf1;a, Venecia y el Papado) que vence a los turcos en Lepanto (1571).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"103,105"}},{"content":"\n<blockquote data-lines=\"105,106\">\n<p data-lines=\"105,106\"><strong>ARMADA INVENCIBLE:</strong> gran flota enviada por Felipe II contra Inglaterra (1588); su derrota inicia la decadencia hisp&#xe1;nica.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"105,107"}}],"payload":{"tag":"h2","lines":"85,86"}},{"content":"Ficha de Repaso R&#xe1;pido","children":[{"content":"\n<p data-lines=\"111,112\"><strong>MONARCAS:</strong> Carlos I (1516-1556) &#x2194; Felipe II (1556-1598).</p>","children":[],"payload":{"tag":"li","lines":"111,113"}},{"content":"\n<p data-lines=\"113,114\"><strong>INTERIOR &#x2013; CARLOS I:</strong> Comunidades (1520-1522, <em>Bravo/Padilla/Maldonado</em>) &#x2192; derrota en <strong>Villalar (1521)</strong> &#xb7; German&#xed;as (Valencia y Mallorca).</p>","children":[],"payload":{"tag":"li","lines":"113,115"}},{"content":"\n<p data-lines=\"115,116\"><strong>INTERIOR &#x2013; FELIPE II:</strong> centralizaci&#xf3;n + <strong>sistema polisinodial</strong> &#xb7; capital en <strong>Madrid (1561)</strong> &#xb7; <strong>Portugal</strong> en <strong>Cortes de Tomar (1581)</strong> &#xb7; Alpujarras (1569-1570) &#xb7; Arag&#xf3;n (1590-1592).</p>","children":[],"payload":{"tag":"li","lines":"115,117"}},{"content":"\n<p data-lines=\"117,118\"><strong>EXTERIOR &#x2013; FRANCIA:</strong> Pav&#xed;a (1525) &#xb7; San Quint&#xed;n (1557) &#x2192; Cateau-Cambr&#xe9;sis (1559).</p>","children":[],"payload":{"tag":"li","lines":"117,119"}},{"content":"\n<p data-lines=\"119,120\"><strong>EXTERIOR &#x2013; TURCOS:</strong> Viena (1532) &#xb7; T&#xfa;nez (1535) &#xb7; <strong>Lepanto (1571)</strong>.</p>","children":[],"payload":{"tag":"li","lines":"119,121"}},{"content":"\n<p data-lines=\"121,122\"><strong>EXTERIOR &#x2013; PROTESTANTES:</strong> M&#xfc;hlberg (1547) &#x2194; Paz de Augsburgo (1555) &#xb7; <strong>Armada Invencible (1588)</strong> &#x27f6; decadencia.</p>","children":[],"payload":{"tag":"li","lines":"121,123"}},{"content":"\n<p data-lines=\"123,124\"><strong>CLAVE:</strong> hegemon&#xed;a hisp&#xe1;nica + defensa del catolicismo &#x27f6; fin del esplendor en 1588.</p>","children":[],"payload":{"tag":"li","lines":"123,125"}}],"payload":{"tag":"h2","lines":"109,110"}},{"content":"Tabla Comparativa: Carlos I &#x2194; Felipe II","children":[{"content":"<table data-lines=\"129,139\">\n<thead data-lines=\"129,130\">\n<tr data-lines=\"129,130\">\n<th>Aspecto</th>\n<th>Carlos I (1516-1556)</th>\n<th>Felipe II (1556-1598)</th>\n</tr>\n</thead>\n<tbody data-lines=\"131,139\">\n<tr data-lines=\"131,132\">\n<td><strong>Territorios</strong></td>\n<td>Reinos hispanos + Imperio (Austria, t&#xed;tulo imperial)</td>\n<td>Todo <em>salvo</em> Austria y t&#xed;tulo imperial</td>\n</tr>\n<tr data-lines=\"132,133\">\n<td><strong>Modelo</strong></td>\n<td>Monarqu&#xed;a universal &#xb7; uni&#xf3;n de estados</td>\n<td>Centralizaci&#xf3;n &#xb7; sistema polisinodial</td>\n</tr>\n<tr data-lines=\"133,134\">\n<td><strong>Capital</strong></td>\n<td>Itinerante</td>\n<td>Madrid (1561)</td>\n</tr>\n<tr data-lines=\"134,135\">\n<td><strong>Conflictos internos</strong></td>\n<td>Comunidades (1520-1522) &#xb7; German&#xed;as</td>\n<td>Alpujarras (1569-1570) &#xb7; Arag&#xf3;n (1590-1592)</td>\n</tr>\n<tr data-lines=\"135,136\">\n<td><strong>Francia</strong></td>\n<td>Pav&#xed;a (1525) &#x2192; Milanesado</td>\n<td>San Quint&#xed;n (1557) &#x2192; Cateau-Cambr&#xe9;sis (1559)</td>\n</tr>\n<tr data-lines=\"136,137\">\n<td><strong>Turcos</strong></td>\n<td>Viena (1532) &#xb7; T&#xfa;nez (1535)</td>\n<td>Lepanto (1571)</td>\n</tr>\n<tr data-lines=\"137,138\">\n<td><strong>Protestantes</strong></td>\n<td>M&#xfc;hlberg (1547) &#x2192; Augsburgo (1555)</td>\n<td>Calvinistas e Inglaterra &#x2192; Armada Invencible (1588)</td>\n</tr>\n<tr data-lines=\"138,139\">\n<td><strong>Ampliaci&#xf3;n territorial</strong></td>\n<td>Anexi&#xf3;n del Milanesado</td>\n<td>Incorporaci&#xf3;n de Portugal (1581)</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"129,139"}}],"payload":{"tag":"h2","lines":"127,128"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. Explica el origen de la <strong>Casa de Austria</strong> y la herencia territorial de <strong>Carlos I</strong>.","children":[],"payload":{"tag":"li","lines":"144,145","listIndex":1}},{"content":"2. Define el concepto de <strong>&quot;uni&#xf3;n de estados&quot;</strong> aplicado a la monarqu&#xed;a de Carlos I.","children":[],"payload":{"tag":"li","lines":"145,146","listIndex":2}},{"content":"3. Desarrolla la <strong>Revuelta de las Comunidades (1520-1522)</strong>: causas, l&#xed;deres y desenlace en <strong>Villalar</strong>.","children":[],"payload":{"tag":"li","lines":"146,147","listIndex":3}},{"content":"4. &#xbf;Qu&#xe9; fueron las <strong>German&#xed;as</strong> y d&#xf3;nde se produjeron?","children":[],"payload":{"tag":"li","lines":"147,148","listIndex":4}},{"content":"5. Explica el <strong>sistema polisinodial</strong> y las medidas centralizadoras de <strong>Felipe II</strong>.","children":[],"payload":{"tag":"li","lines":"148,149","listIndex":5}},{"content":"6. Comenta la incorporaci&#xf3;n de <strong>Portugal</strong> en las <strong>Cortes de Tomar (1581)</strong>.","children":[],"payload":{"tag":"li","lines":"149,150","listIndex":6}},{"content":"7. Se&#xf1;ala los conflictos internos del reinado de Felipe II (<strong>Alpujarras</strong> y <strong>Arag&#xf3;n</strong>).","children":[],"payload":{"tag":"li","lines":"150,151","listIndex":7}},{"content":"8. Analiza la <strong>pol&#xed;tica exterior</strong> frente a <strong>Francia</strong> durante el siglo XVI.","children":[],"payload":{"tag":"li","lines":"151,152","listIndex":8}},{"content":"9. Explica el enfrentamiento contra el <strong>Imperio turco</strong> y el significado de <strong>Lepanto (1571)</strong>.","children":[],"payload":{"tag":"li","lines":"152,153","listIndex":9}},{"content":"10. &#xbf;Por qu&#xe9; la derrota de la <strong>Armada Invencible (1588)</strong> se considera el inicio de la <strong>decadencia hisp&#xe1;nica</strong>?","children":[],"payload":{"tag":"li","lines":"153,154","listIndex":10}}],"payload":{"tag":"h2","lines":"142,143"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
