s</strong>","children":[],"payload":{"tag":"li","lines":"24,26"}}],"payload":{"tag":"h3","lines":"21,22"}},{"content":"4. Repartimientos <em>(s. XIII)</em>","children":[{"content":"<strong>Zona</strong>","children":[{"content":"del <strong>Tajo</strong> al <strong>Guadalquivir</strong>","children":[],"payload":{"tag":"li","lines":"28,29"}},{"content":"<strong>Bajo Arag&#xf3;n</strong> y","children":[],"payload":{"tag":"li","lines":"29,30"}},{"content":"<strong>Levante</strong>","children":[],"payload":{"tag":"li","lines":"30,31"}}],"payload":{"tag":"li","lines":"27,31"}},{"content":"Lotes o <em>heredamientos</em> para <strong>nobles</strong> y <strong>&#xf3;rdenes militares</strong>","children":[],"payload":{"tag":"li","lines":"31,32"}},{"content":"<strong>predominio de los grandes latifundios</strong>","children":[],"payload":{"tag":"li","lines":"32,34"}}],"payload":{"tag":"h3","lines":"26,27"}}],"payload":{"tag":"h2","lines":"6,7"}},{"content":"B. La Sociedad Estamental","children":[{"content":"1. Estamentos Privilegiados","children":[{"content":"<strong>El rey</strong> &#x2192; en la c&#xfa;spide","children":[],"payload":{"tag":"li","lines":"41,42"}},{"content":"<strong>Nobleza</strong> <em>(defiende)</em> &#x2194; <strong>Clero</strong> <em>(reza)</em>","children":[{"content":"Propietarios de la <strong>mayor parte de las tierras</strong>","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"<strong>Exentos de impuestos</strong> y con leyes especiales","children":[],"payload":{"tag":"li","lines":"44,45"}},{"content":"<strong>Mayorazgo</strong> &#x2192; transmisi&#xf3;n <strong>&#xed;ntegra</strong> del patrimonio al <strong>primog&#xe9;nito</strong>","children":[],"payload":{"tag":"li","lines":"45,47"}}],"payload":{"tag":"li","lines":"42,47"}}],"payload":{"tag":"h3","lines":"40,41"}},{"content":"2. Estamento No Privilegiado","children":[{"content":"<strong>Pueblo llano</strong> &#x2192; campesinos y burgues&#xed;a","children":[{"content":"<strong>Trabajaba</strong> para mantener a los privilegiados","children":[],"payload":{"tag":"li","lines":"49,50"}},{"content":"<strong>Pagaba impuestos</strong>","children":[],"payload":{"tag":"li","lines":"50,51"}},{"content":"Depend&#xed;a del <strong>rey</strong> o de los <strong>se&#xf1;ores</strong>","children":[],"payload":{"tag":"li","lines":"51,53"}}],"payload":{"tag":"li","lines":"48,53"}}],"payload":{"tag":"h3","lines":"47,48"}},{"content":"3. Minor&#xed;as Perseguidas","children":[{"content":"<strong>Mud&#xe9;jares</strong> &#x2192; musulmanes en territorio cristiano","children":[],"payload":{"tag":"li","lines":"54,55"}},{"content":"<strong>Jud&#xed;os</strong>","children":[],"payload":{"tag":"li","lines":"55,57"}}],"payload":{"tag":"h3","lines":"53,54"}}],"payload":{"tag":"h2","lines":"36,37"}},{"content":"Conclusi&#xf3;n","children":[{"content":"La <strong>repoblaci&#xf3;n</strong> fue el mecanismo de ocupaci&#xf3;n de las tierras<br>\narrebatadas a <em>Al-&#xc1;ndalus</em>, evolucionando desde la <strong>peque&#xf1;a propiedad<br>\nlibre</strong> <em>(Presura)</em> hasta los <strong>grandes latifundios</strong> *(Repartimientos)<br>\nEste reparto desigual configur&#xf3; una <strong>sociedad estamental</strong> r&#xed;gida,<br>\ndividida entre <strong>privilegiados</strong> <em>(rey, nobleza y clero)</em> y el <strong>pueblo<br>\nllano</strong>. Sus consecuencias &#x2014;concentraci&#xf3;n de la tierra y desigualdad<br>\njur&#xed;dica&#x2014; marcaron la estructura social y econ&#xf3;mica de Espa&#xf1;a durante<br>\nsiglos.","children":[],"payload":{"tag":"li","lines":"61,70"}}],"payload":{"tag":"h2","lines":"59,60"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Presura (s. VIII&#x2013;X)</strong> &#x2192; modelo de peque&#xf1;a/mediana propiedad libre; punto de partida","children":[],"payload":{"tag":"li","lines":"74,75"}},{"content":"<strong>Cartas puebla / Fueros</strong> &#x2192; instrumento jur&#xed;dico de la repoblaci&#xf3;n concejil","children":[],"payload":{"tag":"li","lines":"75,76"}},{"content":"<strong>Encomiendas (mitad s. XII&#x2013;1212)</strong> &#x2192; origen de los latifundios ganaderos de las &#xf3;rdenes militares","children":[],"payload":{"tag":"li","lines":"76,77"}},{"content":"<strong>Repartimientos (s. XIII)</strong> &#x2192; explican el latifundismo del sur peninsular","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"<strong>Mayorazgo</strong> &#x2192; clave de la perpetuaci&#xf3;n del poder y la tierra de la nobleza","children":[],"payload":{"tag":"li","lines":"78,79"}},{"content":"<strong>Sociedad estamental</strong> &#x2192; desigualdad jur&#xed;dica entre privilegiados y no privilegiados","children":[],"payload":{"tag":"li","lines":"79,81"}}],"payload":{"tag":"h2","lines":"72,73"}},{"content":"Glosario de T&#xe9;rminos Clave","children":[{"content":"\n<p data-lines=\"85,86\"><strong>PRESURA (o <em>aprisio</em>):</strong> ocupaci&#xf3;n libre de tierras despobladas con reconocimiento de la propiedad a quien las trabaja.</p>","children":[],"payload":{"tag":"li","lines":"85,87"}},{"content":"\n<p data-lines=\"87,88\"><strong>CARTA PUEBLA:</strong> documento que regulaba la repoblaci&#xf3;n de un lugar, fijando las condiciones y obligaciones de los pobladores.</p>","children":[],"payload":{"tag":"li","lines":"87,89"}},{"content":"\n<p data-lines=\"89,90\"><strong>FUERO:</strong> conjunto de normas, derechos y privilegios concedidos a una ciudad o villa para atraer pobladores.</p>","children":[],"payload":{"tag":"li","lines":"89,91"}},{"content":"\n<p data-lines=\"91,92\"><strong>CONCEJO:</strong> instituci&#xf3;n de gobierno municipal de las villas repobladas entre el Duero y el Tajo.</p>","children":[],"payload":{"tag":"li","lines":"91,93"}},{"content":"\n<p data-lines=\"93,94\"><strong>ENCOMIENDA:</strong> territorio entregado a una orden militar para su administraci&#xf3;n y explotaci&#xf3;n.</p>","children":[],"payload":{"tag":"li","lines":"93,95"}},{"content":"\n<p data-lines=\"95,96\"><strong>&#xd3;RDENES MILITARES:</strong> instituciones religioso-militares <em>(Santiago, Calatrava, Alc&#xe1;ntara)</em> que combinaban funci&#xf3;n guerrera y repobladora.</p>","children":[],"payload":{"tag":"li","lines":"95,97"}},{"content":"\n<p data-lines=\"97,98\"><strong>REPARTIMIENTO:</strong> reparto de las tierras conquistadas en lotes <em>(heredamientos)</em> entre nobles, &#xf3;rdenes y participantes en la conquista.</p>","children":[],"payload":{"tag":"li","lines":"97,99"}},{"content":"\n<p data-lines=\"99,100\"><strong>LATIFUNDIO:</strong> gran propiedad agraria concentrada en pocas manos, caracter&#xed;stica del sur peninsular.</p>","children":[],"payload":{"tag":"li","lines":"99,101"}},{"content":"\n<p data-lines=\"101,102\"><strong>ESTAMENTO:</strong> grupo social cerrado definido por el nacimiento, con un e statuto jur&#xed;dico propio.</p>","children":[],"payload":{"tag":"li","lines":"101,103"}},{"content":"\n<p data-lines=\"103,104\"><strong>MAYORAZGO:</strong> instituci&#xf3;n jur&#xed;dica que vinculaba el patrimonio familiar para transmitirlo &#xed;ntegro al primog&#xe9;nito, impidiendo su divisi&#xf3;n.</p>","children":[],"payload":{"tag":"li","lines":"103,105"}}],"payload":{"tag":"h2","lines":"83,84"}},{"content":"Ficha de Repaso R&#xe1;pido","children":[{"content":"\n<p data-lines=\"111,112\"><strong>MODELOS DE REPOBLACI&#xd3;N (de norte a sur, de antiguo a moderno):</strong></p>","children":[{"content":"<strong>Presura</strong> <em>(VIII&#x2013;X)</em> &#x2192; Duero / Pirineos &#x2192; peque&#xf1;a propiedad libre","children":[],"payload":{"tag":"li","lines":"112,113"}},{"content":"<strong>Concejil</strong> <em>(XI&#x2013;XII)</em> &#x2192; Duero &#x2013;Tajo &#x2192; fueros y cartas puebla","children":[],"payload":{"tag":"li","lines":"113,114"}},{"content":"<strong>Encomiendas</strong> <em>(XII&#x2013;1212)</em> &#x2192; &#xf3;rdenes militares &#x2192; latifundio ganadero","children":[],"payload":{"tag":"li","lines":"114,115"}},{"content":"<strong>Repartimientos</strong> <em>(XIII)</em> &#x2192; Tajo&#x2013;Guadalquivir &#x2192; gran latifundio nobiliario","children":[],"payload":{"tag":"li","lines":"115,117"}}],"payload":{"tag":"li","lines":"111,117"}},{"content":"\n<p data-lines=\"117,118\"><strong>REGLA DE ORO</strong> &#x2192; cuanto m&#xe1;s al <strong>sur</strong> y m&#xe1;s <strong>tarde</strong> &#x2192; <strong>mayor el tama&#xf1;o de la propiedad</strong>.</p>","children":[],"payload":{"tag":"li","lines":"117,119"}},{"content":"\n<p data-lines=\"119,120\"><strong>SOCIEDAD ESTAMENTAL</strong></p>","children":[{"content":"<strong>Privilegiados</strong> &#x2192; Rey + Nobleza <em>(defiende)</em> + Clero <em>(reza)</em> &#x2192; tierras - sin impuestos - mayorazgo","children":[],"payload":{"tag":"li","lines":"120,121"}},{"content":"<strong>No privilegiados</strong> &#x2192; Pueblo llano <em>(campesinos y burgues&#xed;a)</em> &#x2192; trabajan y pagan","children":[],"payload":{"tag":"li","lines":"121,122"}},{"content":"<strong>Minor&#xed;as</strong> &#x2192; mud&#xe9;jares y jud&#xed;os","children":[],"payload":{"tag":"li","lines":"122,124"}}],"payload":{"tag":"li","lines":"119,124"}}],"payload":{"tag":"h2","lines":"109,110"}},{"content":"Tabla Comparativa de Modelos de Repoblaci&#xf3;n","children":[{"content":"<table data-lines=\"128,134\">\n<thead data-lines=\"128,129\">\n<tr data-lines=\"128,129\">\n<th>Modelo</th>\n<th>Cronolog&#xed;a</th>\n<th>Zona</th>\n<th>Protagonistas</th>\n<th>Resultado</th>\n</tr>\n</thead>\n<tbody data-lines=\"130,134\">\n<tr data-lines=\"130,131\">\n<td><strong>Presura</strong></td>\n<td>Mitad s. VIII&#x2013;X</td>\n<td>Norte del Duero / sur Pirineos</td>\n<td>Campesinos libres</td>\n<td>Peque&#xf1;a y mediana propiedad</td>\n</tr>\n<tr data-lines=\"131,132\">\n<td><strong>Concejil</strong></td>\n<td>S. XI &#x2013; mitad s. XII</td>\n<td>Del Duero al Tajo</td>\n<td>Vecinos <em>(concejos)</em></td>\n<td>Ciudades con fueros y privilegios</td>\n</tr>\n<tr data-lines=\"132,133\">\n<td><strong>Encomiendas</strong></td>\n<td>Mitad s. XII&#x2013;1212</td>\n<td>Turia, J&#xfa;car, Guadiana</td>\n<td>&#xd3;rdenes militares</td>\n<td>Latifundios ganaderos</td>\n</tr>\n<tr data-lines=\"133,134\">\n<td><strong>Repartimientos</strong></td>\n<td>S. XIII</td>\n<td>Tajo&#x2013;Guadalquivir, Bajo Arag&#xf3;n, Levante</td>\n<td>Nobles y &#xf3;rdenes militares</td>\n<td>Grandes latifundios</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"128,134"}}],"payload":{"tag":"h2","lines":"126,127"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. <strong>Define el concepto de repoblaci&#xf3;n</strong> y explica su relaci&#xf3;n con el avance de la Reconquista.","children":[],"payload":{"tag":"li","lines":"139,140","listIndex":1}},{"content":"2. <strong>Compara los modelos de Presura y Repartimiento</strong> se&#xf1;alando zona, protagonistas y tipo de propiedad resultante. &#xbf;Por qu&#xe9; generaron estructuras agrarias tan distintas?","children":[],"payload":{"tag":"li","lines":"140,141","listIndex":2}},{"content":"3. <strong>Explica la funci&#xf3;n de las cartas puebla y los fueros</strong> en la repoblaci&#xf3;n concejil.","children":[],"payload":{"tag":"li","lines":"141,142","listIndex":3}},{"content":"4. <strong>&#xbf;Qu&#xe9; papel desempe&#xf1;aron las &#xf3;rdenes militares</strong> en la repoblaci&#xf3;n de los siglos XII y XIII?","children":[],"payload":{"tag":"li","lines":"142,143","listIndex":4}},{"content":"5. <strong>Define la sociedad estamental</strong> e identifica los grupos privilegiados y no privilegiados.","children":[],"payload":{"tag":"li","lines":"143,144","listIndex":5}},{"content":"6. <strong>Explica el concepto de mayorazgo</strong> y su importancia para el mantenimiento del poder de la nobleza.","children":[],"payload":{"tag":"li","lines":"144,145","listIndex":6}},{"content":"7. <strong>Relaciona el modelo de repoblaci&#xf3;n del sur peninsular</strong> con el problema hist&#xf3;rico del latifundismo en Espa&#xf1;a.","children":[],"payload":{"tag":"li","lines":"145,146","listIndex":7}}],"payload":{"tag":"h2","lines":"137,138"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
