XVII.<br>\nMientras la sociedad estamental se empobrec&#xed;a y perd&#xed;a poblaci&#xf3;n, el<br>\ndesprecio al trabajo y el af&#xe1;n de ennoblecimiento agravaban el declive.<br>\nParad&#xf3;jicamente, esta crisis material coincidi&#xf3; con la m&#xe1;xima<br>\nbrillantez cultural: el Siglo de Oro.","children":[],"payload":{"tag":"li","lines":"70,78"}}],"payload":{"tag":"h2","lines":"69,70"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Revoluci&#xf3;n de los precios</strong> &#x2192; consecuencia inflacionaria del oro americano en el XVI","children":[],"payload":{"tag":"li","lines":"79,80"}},{"content":"<strong>Crisis del vell&#xf3;n</strong> &#x2192; s&#xed;mbolo de la quiebra monetaria y financiera del XVII","children":[],"payload":{"tag":"li","lines":"80,81"}},{"content":"<strong>Fracaso de Olivares</strong> &#x2192; muestra la incapacidad de reformar la Monarqu&#xed;a Hisp&#xe1;nica","children":[],"payload":{"tag":"li","lines":"81,82"}},{"content":"<strong>Sociedad estamental (10% / 90%)</strong> &#x2192; clave de la desigualdad y el empobrecimiento del pueblo llano","children":[],"payload":{"tag":"li","lines":"82,83"}},{"content":"<strong>Mentalidad anti-trabajo</strong> &#x2192; factor mental que frena el desarrollo econ&#xf3;mico","children":[],"payload":{"tag":"li","lines":"83,84"}},{"content":"<strong>Siglo de Oro</strong> &#x2192; contraste entre decadencia material y apogeo cultural","children":[],"payload":{"tag":"li","lines":"84,86"}}],"payload":{"tag":"h2","lines":"78,79"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<blockquote data-lines=\"90,91\">\n<p data-lines=\"90,91\"><strong>REVOLUCI&#xd3;N DE LOS PRECIOS:</strong> inflaci&#xf3;n generalizada del siglo XVI causada por la entrada masiva de oro y plata de Am&#xe9;rica.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"90,92"}},{"content":"\n<blockquote data-lines=\"92,93\">\n<p data-lines=\"92,93\"><strong>METALES PRECIOSOS:</strong> oro y plata procedentes de las minas americanas (ej. Potos&#xed;), base de la riqueza de la Monarqu&#xed;a Hisp&#xe1;nica.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"92,94"}},{"content":"\n<blockquote data-lines=\"94,95\">\n<p data-lines=\"94,95\"><strong>CRISIS DEL VELL&#xd3;N:</strong> manipulaci&#xf3;n y devaluaci&#xf3;n de la moneda de cobre (<em>vell&#xf3;n</em>) en el XVII para sufragar gastos, provocando inflaci&#xf3;n.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"94,96"}},{"content":"\n<blockquote data-lines=\"96,97\">\n<p data-lines=\"96,97\"><strong>MEDIDAS DE OLIVARES:</strong> reformas fiscales y pol&#xed;ticas del valido de Felipe IV para sostener el Estado; fracasaron y agravaron la crisis.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"96,98"}},{"content":"\n<blockquote data-lines=\"98,99\">\n<p data-lines=\"98,99\"><strong>SOCIEDAD ESTAMENTAL:</strong> organizaci&#xf3;n jur&#xed;dica cerrada en estamentos privilegiados (nobleza, clero) y no privilegiados (pueblo llano).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"98,100"}},{"content":"\n<blockquote data-lines=\"100,101\">\n<p data-lines=\"100,101\"><strong>PRIVILEGIADOS:</strong> nobleza y clero (10%), exentos de impuestos y con ventajas jur&#xed;dicas.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"100,102"}},{"content":"\n<blockquote data-lines=\"102,103\">\n<p data-lines=\"102,103\"><strong>PUEBLO LLANO:</strong> mayor&#xed;a social (90%) sin privilegios: campesinos, artesanos y burgues&#xed;a; soporta la carga fiscal.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"102,104"}},{"content":"\n<blockquote data-lines=\"104,105\">\n<p data-lines=\"104,105\"><strong>MORISCOS:</strong> musulmanes convertidos al cristianismo; su expulsi&#xf3;n (1609-1614) contribuy&#xf3; al descenso demogr&#xe1;fico.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"104,106"}},{"content":"\n<blockquote data-lines=\"106,107\">\n<p data-lines=\"106,107\"><strong>P&#xcd;CAROS:</strong> poblaci&#xf3;n marginal y mendicante, reflejo literario y social de la pobreza del XVII.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"106,108"}},{"content":"\n<blockquote data-lines=\"108,109\">\n<p data-lines=\"108,109\"><strong>BANDOLERISMO:</strong> delincuencia rural organizada surgida de la miseria y la inestabilidad social.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"108,110"}},{"content":"\n<blockquote data-lines=\"110,111\">\n<p data-lines=\"110,111\"><strong>ENNOBLECIMIENTO:</strong> aspiraci&#xf3;n de la burgues&#xed;a a ascender socialmente comprando tierras y t&#xed;tulos, abandonando la actividad productiva.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"110,112"}},{"content":"\n<blockquote data-lines=\"112,113\">\n<p data-lines=\"112,113\"><strong>HUMANISMO ERASMISTA:</strong> corriente intelectual del XVI inspirada en Erasmo de R&#xf3;terdam, vigente en Espa&#xf1;a hasta 1559.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"112,114"}},{"content":"\n<blockquote data-lines=\"114,115\">\n<p data-lines=\"114,115\"><strong>RENACIMIENTO:</strong> movimiento art&#xed;stico y cultural del XVI inspirado en la Antig&#xfc;edad cl&#xe1;sica.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"114,116"}},{"content":"\n<blockquote data-lines=\"116,117\">\n<p data-lines=\"116,117\"><strong>SIGLO DE ORO:</strong> per&#xed;odo de m&#xe1;ximo esplendor de las letras y las artes espa&#xf1;olas (finales XVI - XVII).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"116,118"}},{"content":"\n<blockquote data-lines=\"118,119\">\n<p data-lines=\"118,119\"><strong>BARROCO:</strong> estilo art&#xed;stico del XVII caracterizado por el dramatismo, el movimiento y el contraste.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"118,120"}}],"payload":{"tag":"h2","lines":"88,89"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"","children":[{"content":"<strong>XVI</strong> &#x2192; auge por Am&#xe9;rica y metales preciosos &#x2192; <strong>revoluci&#xf3;n de los precios</strong> &#x2192; deuda","children":[],"payload":{"tag":"li","lines":"125,126"}},{"content":"<strong>XVII</strong> &#x2192; crisis general &#x2192; <strong>medidas de Olivares</strong> (fracaso) &#x2192; <strong>crisis del vell&#xf3;n</strong> + venta de cargos","children":[],"payload":{"tag":"li","lines":"126,128"}}],"payload":{"tag":"ul","lines":"125,128"}},{"content":"","children":[{"content":"<strong>Estamental</strong>: privilegiados (10%) &#x2194; pueblo llano (90%)","children":[],"payload":{"tag":"li","lines":"129,130"}},{"content":"<strong>Descenso demogr&#xe1;fico</strong> &#x2192; epidemias + expulsi&#xf3;n moriscos + guerras + emigraci&#xf3;n = <strong>-1 mill&#xf3;n hab.</strong>","children":[],"payload":{"tag":"li","lines":"130,131"}},{"content":"Pobreza, <em>p&#xed;caros</em>, bandolerismo, rebeliones","children":[],"payload":{"tag":"li","lines":"131,132"}},{"content":"<strong>Mentalidad</strong>: af&#xe1;n de ennoblecimiento + rechazo al trabajo manual &#x27f6; agrava la crisis","children":[],"payload":{"tag":"li","lines":"132,134"}}],"payload":{"tag":"ul","lines":"129,134"}},{"content":"","children":[{"content":"<strong>XVI</strong> &#x2192; Humanismo erasmista (hasta 1559) + Renacimiento &#x2192; Berruguete, El Greco / Garcilaso, <em>Lazarillo</em>","children":[],"payload":{"tag":"li","lines":"135,136"}},{"content":"<strong>XVII</strong> &#x2192; <strong>Siglo de Oro</strong> + Barroco &#x2192; Cervantes, Quevedo / Vel&#xe1;zquez, G&#xf3;mez de Mora, Mart&#xed;nez Monta&#xf1;&#xe9;s","children":[],"payload":{"tag":"li","lines":"136,138"}}],"payload":{"tag":"ul","lines":"135,138"}}],"payload":{"tag":"h2","lines":"122,123"}},{"content":"Tabla comparativa: Siglo XVI &#x2194; Siglo XVII","children":[{"content":"<table data-lines=\"142,152\">\n<thead data-lines=\"142,143\">\n<tr data-lines=\"142,143\">\n<th>&#xc1;mbito</th>\n<th>Siglo XVI</th>\n<th>Siglo XVII</th>\n</tr>\n</thead>\n<tbody data-lines=\"144,152\">\n<tr data-lines=\"144,145\">\n<td><strong>Tendencia econ&#xf3;mica</strong></td>\n<td>Crecimiento y auge</td>\n<td>Crisis y decadencia</td>\n</tr>\n<tr data-lines=\"145,146\">\n<td><strong>Monarcas</strong></td>\n<td>Carlos V y Felipe II</td>\n<td>Austrias menores (Felipe IV / Olivares)</td>\n</tr>\n<tr data-lines=\"146,147\">\n<td><strong>Factor econ&#xf3;mico clave</strong></td>\n<td>Metales preciosos de Am&#xe9;rica</td>\n<td>Devaluaci&#xf3;n (crisis del vell&#xf3;n), nuevos impuestos</td>\n</tr>\n<tr data-lines=\"147,148\">\n<td><strong>Problema monetario</strong></td>\n<td>Revoluci&#xf3;n de los precios</td>\n<td>Crisis del vell&#xf3;n</td>\n</tr>\n<tr data-lines=\"148,149\">\n<td><strong>Demograf&#xed;a</strong></td>\n<td>Estabilidad / crecimiento</td>\n<td>Descenso (-1 mill&#xf3;n hab.)</td>\n</tr>\n<tr data-lines=\"149,150\">\n<td><strong>Movimiento cultural</strong></td>\n<td>Humanismo y Renacimiento</td>\n<td>Siglo de Oro y Barroco</td>\n</tr>\n<tr data-lines=\"150,151\">\n<td><strong>Figuras art&#xed;sticas</strong></td>\n<td>Berruguete, El Greco</td>\n<td>Vel&#xe1;zquez, Mart&#xed;nez Monta&#xf1;&#xe9;s, G&#xf3;mez de Mora</td>\n</tr>\n<tr data-lines=\"151,152\">\n<td><strong>Figuras literarias</strong></td>\n<td>Garcilaso, <em>Lazarillo</em></td>\n<td>Cervantes, Quevedo</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"142,152"}}],"payload":{"tag":"h2","lines":"140,141"}},{"content":"Preguntas tipo PAU","children":[{"content":"\n<p data-lines=\"157,158\"><strong>1.</strong> Explica las causas y consecuencias de la <strong>revoluci&#xf3;n de los precios</strong> en el siglo XVI.</p>","children":[],"payload":{"tag":"li","lines":"157,159"}},{"content":"\n<p data-lines=\"159,160\"><strong>2.</strong> &#xbf;En qu&#xe9; consistieron las <strong>medidas de Olivares</strong> y por qu&#xe9; fracasaron? Relaci&#xf3;nalas con la <strong>crisis del vell&#xf3;n</strong>.</p>","children":[],"payload":{"tag":"li","lines":"159,161"}},{"content":"\n<p data-lines=\"161,162\"><strong>3.</strong> Describe la estructura de la <strong>sociedad estamental</strong> de los siglos XVI y XVII, indicando el peso de cada grupo y su situaci&#xf3;n fiscal.</p>","children":[],"payload":{"tag":"li","lines":"161,163"}},{"content":"\n<p data-lines=\"163,164\"><strong>4.</strong> Enumera y explica las causas del <strong>descenso demogr&#xe1;fico</strong> del siglo XVII y sus consecuencias sociales.</p>","children":[],"payload":{"tag":"li","lines":"163,165"}},{"content":"\n<p data-lines=\"165,166\"><strong>5.</strong> &#xbf;C&#xf3;mo contribuy&#xf3; la <strong>mentalidad social</strong> (ennoblecimiento, rechazo al trabajo manual) a agravar la crisis econ&#xf3;mica?</p>","children":[],"payload":{"tag":"li","lines":"165,167"}},{"content":"\n<p data-lines=\"167,168\"><strong>6.</strong> Compara la cultura del siglo XVI con la del siglo XVII, citando movimientos y autores representativos.</p>","children":[],"payload":{"tag":"li","lines":"167,169"}},{"content":"\n<p data-lines=\"169,170\"><strong>7.</strong> &quot;El Siglo de Oro coincidi&#xf3; con la decadencia pol&#xed;tica y econ&#xf3;mica.&quot; Razona esta paradoja con ejemplos.</p>","children":[],"payload":{"tag":"li","lines":"169,170"}}],"payload":{"tag":"h2","lines":"155,156"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
