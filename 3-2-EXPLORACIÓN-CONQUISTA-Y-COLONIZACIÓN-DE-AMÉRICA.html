l</p>","children":[{"content":"Se impuso el <strong>castellano</strong>, el <strong>catolicismo</strong> y la <strong>cultura espa&#xf1;ola</strong>","children":[],"payload":{"tag":"li","lines":"59,60"}},{"content":"<strong>Econom&#xed;a monetaria</strong>","children":[],"payload":{"tag":"li","lines":"60,61"}},{"content":"<strong>N</strong>uevos cultivos** &#x2192; <em>trigo</em>, <em>cebada</em>, <em>olivo</em>","children":[],"payload":{"tag":"li","lines":"61,62"}},{"content":"<strong>Nuevos animales</strong> &#x2192; <em>caballo</em>, <em>oveja</em>, <em>vaca</em>","children":[],"payload":{"tag":"li","lines":"62,64"}}],"payload":{"tag":"li","lines":"58,64"}},{"content":"\n<blockquote data-lines=\"64,65\">\n<p data-lines=\"64,65\"><strong>ENCOMIENDA &#x2192;</strong> sistema que entregaba ind&#xed;genas a un colono para trabajar &#x2192;  a cambio de protecci&#xf3;n y evangelizaci&#xf3;n.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"64,66"}}],"payload":{"tag":"h2","lines":"46,47"}},{"content":"D. Consecuencias para Europa","children":[{"content":"Am&#xe9;rica aporta <strong>hegemon&#xed;a a la Monarqu&#xed;a Hisp&#xe1;nica</strong> en el <strong>siglo XVI</strong>","children":[],"payload":{"tag":"li","lines":"70,71"}},{"content":"<strong>Nuevos productos a Europa</strong>","children":[{"content":"<strong>patata</strong>","children":[],"payload":{"tag":"li","lines":"72,73"}},{"content":"<strong>cacao</strong>","children":[],"payload":{"tag":"li","lines":"73,74"}},{"content":"<strong>ma&#xed;z</strong>","children":[],"payload":{"tag":"li","lines":"74,75"}},{"content":"<strong>algod&#xf3;n</strong>","children":[],"payload":{"tag":"li","lines":"75,76"}},{"content":"<strong>pavo</strong>","children":[],"payload":{"tag":"li","lines":"76,77"}}],"payload":{"tag":"li","lines":"71,77"}},{"content":"Grandes ingresos por el control del <strong>tr&#xe1;fico comercial</strong>","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"&#x27f6; provocan una enorme <strong>inflaci&#xf3;n de precios</strong> en el <strong>siglo XVII</strong>","children":[],"payload":{"tag":"li","lines":"78,80"}}],"payload":{"tag":"h2","lines":"68,69"}},{"content":"Conclusi&#xf3;n","children":[{"content":"La exploraci&#xf3;n y conquista de Am&#xe9;rica (1492-1550) convirti&#xf3; a <strong>Castilla</strong> en<br>\nla primera potencia atl&#xe1;ntica y dio a la <strong>Monarqu&#xed;a Hisp&#xe1;nica</strong> la <strong>hegemon&#xed;a<br>\neuropea del siglo XVI</strong>. Supuso la creaci&#xf3;n de un vasto imperio colonial<br>\norganizado en <strong>virreinatos</strong> y sostenido por sistemas de explotaci&#xf3;n ind&#xed;gena.<br>\nSus consecuencias fueron decisivas: intercambio de productos y culturas entre<br>\nambos mundos, catastr&#xf3;fica p&#xe9;rdida demogr&#xe1;fica ind&#xed;gena y una <strong>inflaci&#xf3;n de<br>\nprecios</strong> que marcar&#xed;a la crisis del siglo XVII.","children":[],"payload":{"tag":"li","lines":"84,92"}}],"payload":{"tag":"h2","lines":"82,83"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Capitulaciones de Santa Fe (1492)</strong> &#x2192; base jur&#xed;dica del viaje de Col&#xf3;n","children":[],"payload":{"tag":"li","lines":"96,97"}},{"content":"<strong>12 de octubre de 1492</strong> &#x2192; llegada a Guanahan&#xed; (descubrimiento)","children":[],"payload":{"tag":"li","lines":"97,98"}},{"content":"<strong>Tratado de Tordesillas (1494)</strong> &#x2192; reparto del mundo entre Castilla y Portugal","children":[],"payload":{"tag":"li","lines":"98,99"}},{"content":"<strong>Hern&#xe1;n Cort&#xe9;s / Francisco Pizarro</strong> &#x2192; conquista de aztecas e incas","children":[],"payload":{"tag":"li","lines":"99,100"}},{"content":"<strong>Encomienda, requerimiento y mita</strong> &#x2192; sistemas de explotaci&#xf3;n colonial","children":[],"payload":{"tag":"li","lines":"100,101"}},{"content":"<strong>Inflaci&#xf3;n del siglo XVII</strong> &#x2192; consecuencia econ&#xf3;mica de los ingresos americanos","children":[],"payload":{"tag":"li","lines":"101,103"}}],"payload":{"tag":"h2","lines":"94,95"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<blockquote data-lines=\"107,108\">\n<p data-lines=\"107,108\"><strong>Expansi&#xf3;n atl&#xe1;ntica:</strong> proceso de exploraci&#xf3;n oce&#xe1;nica iniciado por Castilla y Portugal en los siglos XV-XVI.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"107,109"}},{"content":"\n<blockquote data-lines=\"109,110\">\n<p data-lines=\"109,110\"><strong>Capitulaciones de Santa Fe (1492):</strong> contrato entre los Reyes Cat&#xf3;licos y Col&#xf3;n con t&#xed;tulos y beneficios.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"109,111"}},{"content":"\n<blockquote data-lines=\"111,112\">\n<p data-lines=\"111,112\"><strong>Tratado de Tordesillas (1494):</strong> acuerdo que dividi&#xf3; las zonas de influencia entre Castilla (oeste) y Portugal (este).</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"111,113"}},{"content":"\n<blockquote data-lines=\"113,114\">\n<p data-lines=\"113,114\"><strong>Virreinato:</strong> gran circunscripci&#xf3;n territorial americana gobernada por un virrey en nombre del rey.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"113,115"}},{"content":"\n<blockquote data-lines=\"115,116\">\n<p data-lines=\"115,116\"><strong>Encomienda:</strong> asignaci&#xf3;n de ind&#xed;genas a un colono para que trabajasen a cambio de protecci&#xf3;n y evangelizaci&#xf3;n.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"115,117"}},{"content":"\n<blockquote data-lines=\"117,118\">\n<p data-lines=\"117,118\"><strong>Requerimiento:</strong> documento le&#xed;do a los ind&#xed;genas exigi&#xe9;ndoles aceptar la autoridad de la Corona y la fe cat&#xf3;lica.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"117,119"}},{"content":"\n<blockquote data-lines=\"119,120\">\n<p data-lines=\"119,120\"><strong>Mita:</strong> sistema de trabajo forzado y rotatorio de origen incaico, usado sobre todo en las minas.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"119,121"}},{"content":"\n<blockquote data-lines=\"121,122\">\n<p data-lines=\"121,122\"><strong>Leyes de Indias:</strong> conjunto de normas dictadas por la Corona para regular el gobierno y proteger a los ind&#xed;genas.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"121,123"}},{"content":"\n<blockquote data-lines=\"123,124\">\n<p data-lines=\"123,124\"><strong>Monarqu&#xed;a Hisp&#xe1;nica:</strong> conjunto de territorios bajo los Austrias, potencia hegem&#xf3;nica del siglo XVI.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"123,125"}}],"payload":{"tag":"h2","lines":"105,106"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"<strong>Inicio:</strong> Castilla + conquista de Canarias &#x2192; descubrimiento (<strong>1492</strong>)","children":[],"payload":{"tag":"li","lines":"129,130"}},{"content":"<strong>Causas:</strong> t&#xe9;cnicas + religiosas + pol&#xed;ticas (rivalidad con Portugal)","children":[],"payload":{"tag":"li","lines":"130,131"}},{"content":"<strong>Col&#xf3;n:</strong> Capitulaciones de Santa Fe &#x2192; Puerto de Palos (3-ago-1492) &#x2192; Guanahan&#xed; (12-oct-1492)","children":[],"payload":{"tag":"li","lines":"131,132"}},{"content":"<strong>Reparto:</strong> Tratado de Tordesillas (<strong>1494</strong>) &#x2192; Castilla oeste / Portugal este","children":[],"payload":{"tag":"li","lines":"132,133"}},{"content":"<strong>Etapa antillana (1493-1519):</strong> Caribe &#xb7; Balboa-Pac&#xed;fico (1513) &#xb7; Magallanes-Elcano (1519-1522)","children":[],"payload":{"tag":"li","lines":"133,134"}},{"content":"<strong>Etapa continental (1519-1550):</strong> Cort&#xe9;s-aztecas (1519-1521) &#xb7; Pizarro-incas (1531-1533)","children":[],"payload":{"tag":"li","lines":"134,135"}},{"content":"<strong>Colonizaci&#xf3;n:</strong> virreinatos (Nueva Espa&#xf1;a y Per&#xfa;) + encomienda/requerimiento/mita","children":[],"payload":{"tag":"li","lines":"135,136"}},{"content":"<strong>Impacto ind&#xed;gena:</strong> ca&#xed;da demogr&#xe1;fica &#xb7; denuncia de Las Casas &#xb7; Leyes de Indias","children":[],"payload":{"tag":"li","lines":"136,137"}},{"content":"<strong>Aculturaci&#xf3;n:</strong> castellano + catolicismo + cultivos y animales europeos","children":[],"payload":{"tag":"li","lines":"137,138"}},{"content":"<strong>Consecuencias:</strong> hegemon&#xed;a s. XVI &#xb7; nuevos productos &#xb7; inflaci&#xf3;n s. XVII","children":[],"payload":{"tag":"li","lines":"138,140"}}],"payload":{"tag":"h2","lines":"127,128"}},{"content":"Tabla comparativa","children":[{"content":"<table data-lines=\"144,151\">\n<thead data-lines=\"144,145\">\n<tr data-lines=\"144,145\">\n<th>Elemento</th>\n<th>Etapa antillana (1493-1519)</th>\n<th>Etapa continental (1519-1550)</th>\n</tr>\n</thead>\n<tbody data-lines=\"146,151\">\n<tr data-lines=\"146,147\">\n<td>Espacio</td>\n<td>Caribe / Antillas</td>\n<td>Tierra firme continental</td>\n</tr>\n<tr data-lines=\"147,148\">\n<td>Hitos</td>\n<td>Balboa descubre el Pac&#xed;fico (1513)</td>\n<td>Conquista de aztecas e incas</td>\n</tr>\n<tr data-lines=\"148,149\">\n<td>Vuelta al mundo</td>\n<td>Magallanes-Elcano (1519-1522)</td>\n<td>&#x2014;</td>\n</tr>\n<tr data-lines=\"149,150\">\n<td>Protagonistas</td>\n<td>N&#xfa;&#xf1;ez de Balboa</td>\n<td>Cort&#xe9;s, Pizarro, Orellana, Soto, Valdivia</td>\n</tr>\n<tr data-lines=\"150,151\">\n<td>Imperios conquistados</td>\n<td>&#x2014;</td>\n<td>Azteca (Cort&#xe9;s) &#xb7; Inca (Pizarro)</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"144,151"}},{"content":"<table data-lines=\"152,157\">\n<thead data-lines=\"152,153\">\n<tr data-lines=\"152,153\">\n<th>Sistema colonial</th>\n<th>Definici&#xf3;n</th>\n<th>Funci&#xf3;n</th>\n</tr>\n</thead>\n<tbody data-lines=\"154,157\">\n<tr data-lines=\"154,155\">\n<td><strong>Encomienda</strong></td>\n<td>Ind&#xed;genas asignados a un colono</td>\n<td>Trabajo + protecci&#xf3;n/evangelizaci&#xf3;n</td>\n</tr>\n<tr data-lines=\"155,156\">\n<td><strong>Requerimiento</strong></td>\n<td>Texto legal le&#xed;do al ind&#xed;gena</td>\n<td>Exigir sumisi&#xf3;n a la Corona y la fe</td>\n</tr>\n<tr data-lines=\"156,157\">\n<td><strong>Mita</strong></td>\n<td>Trabajo forzado rotatorio</td>\n<td>Mano de obra (sobre todo minas)</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"152,157"}}],"payload":{"tag":"h2","lines":"142,143"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. Explica las <strong>causas</strong> del descubrimiento de Am&#xe9;rica y el papel de las <strong>Capitulaciones de Santa Fe (1492)</strong>.","children":[],"payload":{"tag":"li","lines":"162,163","listIndex":1}},{"content":"2. Define y sit&#xfa;a cronol&#xf3;gicamente el <strong>Tratado de Tordesillas (1494)</strong> y explica su importancia.","children":[],"payload":{"tag":"li","lines":"163,164","listIndex":2}},{"content":"3. Diferencia la <strong>etapa antillana</strong> de la <strong>etapa continental</strong>, citando sus protagonistas y hitos.","children":[],"payload":{"tag":"li","lines":"164,165","listIndex":3}},{"content":"4. Describe la organizaci&#xf3;n colonial de Am&#xe9;rica: <strong>virreinatos</strong> y sistemas de <strong>encomienda, requerimiento y mita</strong>.","children":[],"payload":{"tag":"li","lines":"165,166","listIndex":4}},{"content":"5. Analiza las <strong>consecuencias demogr&#xe1;ficas y culturales</strong> de la colonizaci&#xf3;n para la poblaci&#xf3;n ind&#xed;gena.","children":[],"payload":{"tag":"li","lines":"166,167","listIndex":5}},{"content":"6. Valora las <strong>consecuencias econ&#xf3;micas</strong> de Am&#xe9;rica para Europa y la relaci&#xf3;n con la <strong>inflaci&#xf3;n del siglo XVII</strong>.","children":[],"payload":{"tag":"li","lines":"167,168","listIndex":6}}],
