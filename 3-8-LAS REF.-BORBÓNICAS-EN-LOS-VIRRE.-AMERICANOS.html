rong>Carlos III (1759-1788)</strong> &#x2192; con asesoramiento <em>ilustrado</em>","children":[],"payload":{"tag":"li","lines":"22,23"}}],"payload":{"tag":"li","lines":"19,23"}},{"content":"Objetivos concretos","children":[{"content":"mejorar la <strong>explotaci&#xf3;n de recursos</strong>","children":[],"payload":{"tag":"li","lines":"24,25"}},{"content":"aumentar la <strong>recaudaci&#xf3;n fiscal</strong>","children":[],"payload":{"tag":"li","lines":"25,26"}},{"content":"frenar el poder de la <strong>aristocracia criolla</strong> y del <strong>clero</strong>","children":[],"payload":{"tag":"li","lines":"26,28"}}],"payload":{"tag":"li","lines":"23,28"}}],"payload":{"tag":"h2","lines":"17,18"}},{"content":"C. Reformas Administrativas","children":[{"content":"\n<p data-lines=\"32,33\">Reorganizaci&#xf3;n del <strong>mapa administrativo</strong></p>","children":[],"payload":{"tag":"li","lines":"32,33"}},{"content":"\n<p data-lines=\"33,34\">Virreinatos antiguos <strong>Nueva Espa&#xf1;a</strong> y <strong>Per&#xfa;</strong></p>","children":[],"payload":{"tag":"li","lines":"33,34"}},{"content":"\n<p data-lines=\"34,35\">Nuevos virreinatos</p>","children":[{"content":"<strong>Nueva Granada (1740)</strong>","children":[],"payload":{"tag":"li","lines":"35,36"}},{"content":"<strong>R&#xed;o de la Plata (1776)</strong>","children":[],"payload":{"tag":"li","lines":"36,37"}}],"payload":{"tag":"li","lines":"34,37"}},{"content":"\n<p data-lines=\"37,38\">Cuatro <strong>Capitan&#xed;as Generales</strong></p>","children":[{"content":"Guatemala","children":[],"payload":{"tag":"li","lines":"38,39"}},{"content":"Venezuela","children":[],"payload":{"tag":"li","lines":"39,40"}},{"content":"Chile","children":[],"payload":{"tag":"li","lines":"40,41"}},{"content":"La Habana","children":[],"payload":{"tag":"li","lines":"41,42"}}],"payload":{"tag":"li","lines":"37,42"}},{"content":"\n<p data-lines=\"42,43\"><strong>Intendencias Provinciales (1764)</strong> &#x2192; centralizaban funcione ontent":"Resultado positivo &#x2192; <strong>consolidaci&#xf3;n del poder de la metr&#xf3;poli</strong>","children":[],"payload":{"tag":"li","lines":"65,66"}},{"content":"Resultado negativo &#x2192; <strong>tensiones con criollos y potencias rivales</strong>","children":[],"payload":{"tag":"li","lines":"66,67"}},{"content":"&#x27f6; preludio de los <strong>futuros conflictos independentistas</strong>","children":[],"payload":{"tag":"li","lines":"67,69"}}],"payload":{"tag":"h2","lines":"62,63"}},{"content":"Conclusi&#xf3;n","children":[{"content":"Las <strong>Reformas Borb&#xf3;nicas</strong> fueron el intento ilustrado de modernizar y<br>\ncentralizar el control espa&#xf1;ol sobre Am&#xe9;rica durante el siglo XVIII, especialmente<br>\nbajo <strong>Carlos III</strong>. Reorganizaron el territorio, mejoraron la fiscalidad y<br>\nreforzaron la defensa, consolidando la hegemon&#xed;a de la metr&#xf3;poli. Sin embargo, el<br>\nmalestar de los <strong>criollos</strong>, apartados del poder, sembr&#xf3; las tensiones que<br>\ndesembocar&#xed;an en los <strong>procesos de independencia</strong> del siglo XIX.","children":[],"payload":{"tag":"li","lines":"73,80"}}],"payload":{"tag":"h2","lines":"71,72"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Felipe V (1701)</strong> &#x2192; inicio de la dinast&#xed;a borb&#xf3;nica y de las reformas coloniales","children":[],"payload":{"tag":"li","lines":"82,83"}},{"content":"<strong>Carlos III (1759-1788)</strong> &#x2192; principal impulsor de las reformas con esp&#xed;ritu ilustrado","children":[],"payload":{"tag":"li","lines":"83,84"}},{"content":"<strong>Nueva Granada (1740) y R&#xed;o de la Plata (1776)</strong> &#x2192; nuevos virreinatos del mapa reformado","children":[],"payload":{"tag":"li","lines":"84,85"}},{"content":"<strong>Intendencias (1764)</strong> &#x2192; clave de la centralizaci&#xf3;n administrativa y fiscal","children":[],"payload":{"tag":"li","lines":"85,86"}},{"content":"<strong>Decreto de Libre Comercio (1778)</strong> &#x2192; culminaci&#xf3;n de la liberalizaci&#xf3;n comercial","children":[],"payload":{"tag":"li","lines":"86,87"}},{"content":"<strong>Tensiones con los criollos</strong> &#x2192; causa profunda de los futuros movimientos independentistas","children":[],"payload":{"tag":"li","lines":"87,89"}}],"payload":{"tag":"h2","lines":"80,81"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"<strong>Borbones</strong> &#x2192; dinast&#xed;a reinante en Espa&#xf1;a desde <strong>1700</strong> (Felipe V), de origen franc&#xe9;s, defensora del <em>absolutismo centralizador</em>.","children":[],"payload":{"tag":"li","lines":"93,94"}},{"content":"<strong>Reformas Borb&#xf3;nicas</strong> &#x2192; conjunto de medidas administrativas, fiscales, econ&#xf3;micas y militares del s. XVIII para reforzar el control de la metr&#xf3;poli sobre Am&#xe9;rica.","children":[],"payload":{"tag":"li","lines":"94,95"}},{"content":"<strong>Virreinato</strong> &#x2192; gran circunscripci&#xf3;n territorial americana gobernada por un <em>virrey</em> en representaci&#xf3;n del rey.","children":[],"payload":{"tag":"li","lines":"95,96"}},{"content":"<strong>Capitan&#xed;a General</strong> &#x2192; demarcaci&#xf3;n militar y administrativa con autonom&#xed;a defensiva, al frente un <em>capit&#xe1;n general</em>.","children":[],"payload":{"tag":"li","lines":"96,97"}},{"content":"<strong>Intendencia</strong> &#x2192; circunscripci&#xf3;n centralizada que reun&#xed;a funciones judiciales, militares y fiscales (implantada en <strong>1764</strong>).","children":[],"payload":{"tag":"li","lines":"97,98"}},{"content":"<strong>Corregimiento</strong> &#x2192; antigua divisi&#xf3;n administrativa de los Habsburgo, suprimida y sustituida por las intendencias en <strong>1784</strong>.","children":[],"payload":{"tag":"li","lines":"98,99"}},{"content":"<strong>Criollos</strong> &#x2192; descendientes de espa&#xf1;oles nacidos en Am&#xe9;rica; relegados del alto po ,145\">\n<td><strong>Capitan&#xed;as Generales</strong></td>\n<td>s. XVIII</td>\n<td>Guatemala, Venezuela, Chile, La Habana</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"138,145"}}],"payload":{"tag":"h3","lines":"136,137"}},{"content":"Habsburgo &#x2194; Borbones en la administraci&#xf3;n colonial","children":[{"content":"<table data-lines=\"148,155\">\n<thead data-lines=\"148,149\">\n<tr data-lines=\"148,149\">\n<th>Aspecto</th>\n<th>Habsburgo (s. XVI-XVII)</th>\n<th>Borbones (s. XVIII)</th>\n</tr>\n</thead>\n<tbody data-lines=\"150,155\">\n<tr data-lines=\"150,151\">\n<td>Modelo de poder</td>\n<td>Descentralizado, pactista</td>\n<td><strong>Centralizado y absolutista</strong></td>\n</tr>\n<tr data-lines=\"151,152\">\n<td>Cargo local clave</td>\n<td><strong>Corregimiento</strong></td>\n<td><strong>Intendencia (1764)</strong></td>\n</tr>\n<tr data-lines=\"152,153\">\n<td>Fiscalidad</td>\n<td>Baja recaudaci&#xf3;n, corrupci&#xf3;n</td>\n<td>Mayor recaudaci&#xf3;n y control</td>\n</tr>\n<tr data-lines=\"153,154\">\n<td>Comercio</td>\n<td>Monopolio r&#xed;gido, contrabando</td>\n<td>Liberalizaci&#xf3;n &#x2192; <strong>Libre Comercio (1778)</strong></td>\n</tr>\n<tr data-lines=\"154,155\">\n<td>Papel del criollo</td>\n<td>Acceso a cargos</td>\n<td>Marginaci&#xf3;n del alto poder</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"148,155"}}],"payload":{"tag":"h3","lines":"146,147"}},{"content":"Tipos de reforma","children":[{"content":"<table data-lines=\"158,164\">\n<thead data-lines=\"158,159\">\n<tr data-lines=\"158,159\">\n<th>&#xc1;mbito</th>\n<th>Medida principal</th>\n<th>Finalidad</th>\n</tr>\n</thead>\n<tbody data-lines=\"160,164\">\n<tr data-lines=\"160,161\">\n<td><strong>Administrativo</strong></td>\n<td>Intendencias y nuevos virreinatos</td>\n<td>Centralizar y controlar</td>\n</tr>\n<tr data-lines=\"161,162\">\n<td><strong>Econ&#xf3;mico</strong></td>\n<td>Decreto de Libre Comercio (1778)</td> >Comenta</strong> la siguiente afirmaci&#xf3;n: <em>&quot;Las reformas consolidaron el poder de la metr&#xf3;poli, pero generaron tensiones con los criollos.&quot;</em>","children":[],"payload":{"tag":"li","lines":"175,176","listIndex":7}}],"payload":{"tag":"h2","lines":"167,168"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
