content":"<strong>1085</strong> &#x2192; <strong>Alfonso VI</strong> toma <strong>Toledo</strong>","children":[],"payload":{"tag":"li","lines":"45,47"}}],"payload":{"tag":"h3","lines":"41,42"}},{"content":"2. <strong>Almor&#xe1;vides (1086-1145)</strong>","children":[{"content":"Taifas piden ayuda &#x27f6; llegan los <strong>almor&#xe1;vides</strong>","children":[],"payload":{"tag":"li","lines":"48,49"}},{"content":"Victorias","children":[{"content":"<strong>Sagrajas (1086)</strong>","children":[],"payload":{"tag":"li","lines":"50,51"}},{"content":"<strong>Ucl&#xe9;s (1108)</strong>","children":[],"payload":{"tag":"li","lines":"51,52"}}],"payload":{"tag":"li","lines":"49,52"}},{"content":"Incorporan Al-&#xc1;ndalus <strong>(1090-1145)</strong> &#x2192; tras su ca&#xed;da &#x27f6; <strong>segundos reinos de taifas</strong>","children":[],"payload":{"tag":"li","lines":"52,54"}}],"payload":{"tag":"h3","lines":"47,48"}},{"content":"3. <strong>Almohades (1146-1232)</strong>","children":[{"content":"<strong>1146</strong> &#x2192; los <strong>almohades</strong> unifican Al-&#xc1;ndalus","children":[],"payload":{"tag":"li","lines":"55,56"}},{"content":"<strong>1212</strong> &#x2192; derrota en <strong>Las Navas de Tolosa</strong> &#x2194; coalici&#xf3;n cristiana de <strong>Alfonso VIII de Castilla</strong>","children":[],"payload":{"tag":"li","lines":"56,57"}},{"content":"Desaparici&#xf3;n <strong>(1232)</strong> &#x2192; <strong>terceros reinos de taifas</strong>","children":[],"payload":{"tag":"li","lines":"57,59"}}],"payload":{"tag":"h3","lines":"54,55"}},{"content":"4. <strong>Reino Nazar&#xed; de Granada (1238-1492)</strong>","children":[{"content":"&#xda;nico reino superviviente a la Reconquista","children":[],"payload":{"tag":"li","lines":"60,61"}},{"content":"Sometido a Castilla tras derrota benimer&#xed;n en el <strong>r&#xed;o Salado (1340)</strong>","children":[],"payload":{"tag":"li","lines":"61,62"}},{"content":"<strong>1492</strong> &#x2192; conquista por los <strong>Reyes Cat&#xf3;licos</strong> &#x2192; fin de Al-&#xc1;ndalus","children":[],"payload":{"tag":"li","lines":"62,64"}}],"payload":{"tag":"h3","lines":"59,60"}}],"payload":{"tag":"h2","lines":"39,40"}},{"content":"Conclusi&#xf3;n","children":[{"content":"Al-&#xc1;ndalus fue el territorio musulm&#xe1;n de la pen&#xed;nsula (<strong>711-1492</strong>), que<br>\nevolucion&#xf3; de emirato dependiente a califato independiente y esplendoroso, antes<br>\nde fragmentarse en reinos de taifas. Su debilidad pol&#xed;tica, frente al avance<br>\ncristiano y pese al refuerzo de almor&#xe1;vides y almohades, condujo a su progresiva<br>\nreducci&#xf3;n hasta el reino nazar&#xed; de Granada. Su desaparici&#xf3;n en <strong>1492</strong> culmina<br>\nla Reconquista y marca el nacimiento de la Espa&#xf1;a moderna.","children":[],"payload":{"tag":"li","lines":"68,75"}}],"payload":{"tag":"h2","lines":"66,67"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>711 (Guadalete)</strong> &#x2192; inicio de la conquista isl&#xe1;mica","children":[],"payload":{"tag":"li","lines":"77,78"}},{"content":"<strong>Abderram&#xe1;n I (756)</strong> &#x2192; emirato independiente con capital en C&#xf3;rdoba","children":[],"payload":{"tag":"li","lines":"78,79"}},{"content":"<strong>Abderram&#xe1;n III (929)</strong> &#x2192; proclamaci&#xf3;n del Califato &#x2192; m&#xe1;ximo esplendor","children":[],"payload":{"tag":"li","lines":"79,80"}},{"content":"<strong>&quot;Parias&quot;</strong> &#x2192; tributos de las taifas a los cristianos &#x27f6; debilidad pol&#xed;tica","children":[],"payload":{"tag":"li","lines":"80,81"}},{"content":"<strong>Las Navas de Tolosa (1212)</strong> &#x2192; punto de inflexi&#xf3;n que hunde a los almohades","children":[],"payload":{"tag":"li","lines":"81,82"}},{"content":"<strong>1492 (Granada)</strong> &#x2192; fin de Al-&#xc1;ndalus y de la Reconquista","children":[],"payload":{"tag":"li","lines":"82,84"}}],"payload":{"tag":"h2","lines":"75,76"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<p data-lines=\"88,89\"><strong>AL-&#xc1;NDALUS:</strong> territorio de la pen&#xed;nsula bajo dominio musulm&#xe1;n (711-1492).</p>","children":[],"payload":{"tag":"li","lines":"88,90"}},{"content":"\n<p data-lines=\"90,91\"><strong>EMIRATO DEPENDIENTE:</strong> provincia isl&#xe1;mica gobernada por un emir, subordinada pol&#xed;tica y religiosamente al califato Omeya de Damasco.</p>","children":[],"payload":{"tag":"li","lines":"90,92"}},{"content":"\n<p data-lines=\"92,93\"><strong>EMIRATO INDEPENDIENTE:</strong> Estado con autonom&#xed;a pol&#xed;tica propia, pero que mantiene la dependencia religiosa del califa.</p>","children":[],"payload":{"tag":"li","lines":"92,94"}},{"content":"\n<p data-lines=\"94,95\"><strong>CALIFATO:</strong> Estado isl&#xe1;mico plenamente independiente, pol&#xed;tico &#x2194; religioso, gobernado por un califa (m&#xe1;xima autoridad religiosa y civil).</p>","children":[],"payload":{"tag":"li","lines":"94,96"}},{"content":"\n<p data-lines=\"96,97\"><strong>RAZIA:</strong> expedici&#xf3;n militar de saqueo y castigo en territorio cristiano, sin af&#xe1;n de conquista permanente.</p>","children":[],"payload":{"tag":"li","lines":"96,98"}},{"content":"\n<p data-lines=\"98,99\"><strong>TAIFA:</strong> peque&#xf1;o reino independiente surgido tras la fragmentaci&#xf3;n del califato (<em>taifa</em> = &quot;facci&#xf3;n, bando&quot;).</p>","children":[],"payload":{"tag":"li","lines":"98,100"}},{"content":"\n<p data-lines=\"100,101\"><strong>PARIAS:</strong> tributos en oro pagados por las taifas a los reinos cristianos a cambio de protecci&#xf3;n o no agresi&#xf3;n.</p>","children":[],"payload":{"tag":"li","lines":"100,102"}},{"content":"\n<p data-lines=\"102,103\"><strong>ALMOR&#xc1;VIDES:</strong> dinast&#xed;a bereber norteafricana, rigorista, que unific&#xf3; Al-&#xc1;ndalus tras la ca&#xed;da de los primeros taifas.</p>","children":[],"payload":{"tag":"li","lines":"102,104"}},{"content":"\n<p data-lines=\"104,105\"><strong>ALMOHADES:</strong> dinast&#xed;a bereber posterior, tambi&#xe9;n unificadora y rigorista, derrotada en Las Navas de Tolosa.</p>","children":[],"payload":{"tag":"li","lines":"104,106"}},{"content":"\n<p data-lines=\"106,107\"><strong>REINO NAZAR&#xcd;:</strong> &#xfa;ltimo Estado musulm&#xe1;n peninsular (Granada, 1238-1492), tributario de Castilla.</p>","children":[],"payload":{"tag":"li","lines":"106,108"}}],"payload":{"tag":"h2","lines":"86,87"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"\n<p data-lines=\"112,113\"><strong>Marco temporal:</strong> <strong>711-1492</strong> (de Guadalete a la conquista de Granada).</p>","children":[],"payload":{"tag":"li","lines":"112,114"}},{"content":"\n<p data-lines=\"114,115\"><strong>Hilo conductor:</strong> unidad &#x2192; esplendor &#x2192; fragmentaci&#xf3;n &#x2192; refuerzo norteafricano &#x2192; reducci&#xf3;n final.</p>","children":[],"payload":{"tag":"li","lines":"114,116"}},{"content":"\n<p data-lines=\"116,117\"><strong>Etapas en cadena</strong></p>","children":[{"content":"<strong>Conquista (711)</strong> &#x2192; <em>Tarik</em> vence a Don Rodrigo en <strong>Guadalete</strong>","children":[],"payload":{"tag":"li","lines":"117,118"}},{"content":"<strong>Emirato (756)</strong> &#x2192; <strong>Abderram&#xe1;n I</strong>, capital <strong>C&#xf3;rdoba</strong> (independencia pol&#xed;tica)","children":[],"payload":{"tag":"li","lines":"118,119"}},{"content":"<strong>Califato (929)</strong> &#x2192; <strong>Abderram&#xe1;n III</strong>, esplendor &#x2192; <em>Almanzor</em> y las razias","children":[],"payload":{"tag":"li","lines":"119,120"}},{"content":"<strong>Taifas (1031)</strong> &#x2192; fragmentaci&#xf3;n + <strong>parias</strong> &#x2192; caen ante el avance cristiano","children":[],"payload":{"tag":"li","lines":"120,121"}},{"content":"<strong>Imperios bereberes</strong> &#x2192; <strong>almor&#xe1;vides</strong> y <strong>almohades</strong> &#x2192; derrota en <strong>Las Navas (1212)</strong>","children":[],"payload":{"tag":"li","lines":"121,122"}},{"content":"<strong>Nazar&#xed;es (1238)</strong> &#x2192; Granada resiste hasta <strong>1492</strong>","children":[],"payload":{"tag":"li","lines":"122,124"}}],"payload":{"tag":"li","lines":"116,124"}},{"content":"\n<p data-lines=\"124,125\"><strong>3 victorias musulmanas clave</strong></p>","children":[{"content":"Guadalete (711)","children":[],"payload":{"tag":"li","lines":"125,126"}},{"content":"Sagrajas (1086)","children":[],"payload":{"tag":"li","lines":"126,127"}},{"content":"Ucl&#xe9;s (1108)","children":[],"payload":{"tag":"li","lines":"127,128"}}],"payload":{"tag":"li","lines":"124,128"}},{"content":"\n<p data-lines=\"128,129\"><strong>1 derrota decisiva:</strong> Las Navas de Tolosa (1212)</p>","children":[],"payload":{"tag":"li","lines":"128,130"}},{"content":"\n<p data-lines=\"130,131\"><strong>Idea PAU:</strong> la <em>debilidad pol&#xed;tica interna</em> (revueltas, taifas, dependencia bereber) **explica el avance cristiano a largo plazo.</p>","children":[],"payload":{"tag":"li","lines":"130,132"}}],"payload":{"tag":"h2","lines":"110,111"}},{"content":"Tabla comparativa de etapas pol&#xed;ticas","children":[{"content":"<table data-lines=\"136,146\">\n<thead data-lines=\"136,137\">\n<tr data-lines=\"136,137\">\n<th>Etapa</th>\n<th>Fechas</th>\n<th>L&#xed;der / Hito</th>\n<th>Capital</th>\n<th>Rasgo clave</th>\n</tr>\n</thead>\n<tbody data-lines=\"138,146\">\n<tr data-lines=\"138,139\">\n<td><strong>Conquista</strong></td>\n<td>711-716</td>\n<td>Tarik (Guadalete, 711)</td>\n<td>&#x2014;</td>\n<td>Dominio casi total de la pen&#xed;nsula</td>\n</tr>\n<tr data-lines=\"139,140\">\n<td><strong>Emirato dependiente</strong></td>\n<td>711-756</td>\n<td>Califato Omeya (Damasco)</td>\n<td>C&#xf3;rdoba</td>\n<td>Dependencia pol&#xed;tica y religiosa</td>\n</tr>\n<tr data-lines=\"140,141\">\n<td><strong>Emirato independiente</strong></td>\n<td>756-929</td>\n<td>Abderram&#xe1;n I</td>\n<td>C&#xf3;rdoba</td>\n<td>Independencia pol&#xed;tica, no religiosa</td>\n</tr>\n<tr data-lines=\"141,142\">\n<td><strong>Califato de C&#xf3;rdoba</strong></td>\n<td>929-1031</td>\n<td>Abderram&#xe1;n III / Almanzor</td>\n<td>C&#xf3;rdoba</td>\n<td>Esplendor; independencia total</td>\n</tr>\n<tr data-lines=\"142,143\">\n<td><strong>Primeros taifas</strong></td>\n<td>1031-1086</td>\n<td>(fragmentaci&#xf3;n)</td>\n<td>varias</td>\n<td>Pago de parias; Toledo cae (1085)</td>\n</tr>\n<tr data-lines=\"143,144\">\n<td><strong>Almor&#xe1;vides</strong></td>\n<td>1086-1145</td>\n<td>Sagrajas (1086), Ucl&#xe9;s (1108)</td>\n<td>&#x2014;</td>\n<td>Unificaci&#xf3;n bereber rigorista</td>\n</tr>\n<tr data-lines=\"144,145\">\n<td><strong>Almohades</strong></td>\n<td>1146-1232</td>\n<td>Las Navas de Tolosa (1212)</td>\n<td>&#x2014;</td>\n<td>Derrota ante coalici&#xf3;n cristiana</td>\n</tr>\n<tr data-lines=\"145,146\">\n<td><strong>Reino nazar&#xed;</strong></td>\n<td>1238-1492</td>\n<td>Reyes Cat&#xf3;licos (1492)</td>\n<td>Granada</td>\n<td>&#xda;ltimo reducto musulm&#xe1;n</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"136,146"}}],"payload":{"tag":"h2","lines":"134,135"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. Explica las fases de la conquista isl&#xe1;mica de la pen&#xed;nsula (711-716) y la estructura social que se impuso en Al-&#xc1;ndalus.","children":[],"payload":{"tag":"li","lines":"151,152","listIndex":1}},{"content":"2. Diferencia entre <strong>emirato dependiente</strong>, <strong>emirato independiente</strong> y <strong>califato</strong>. &#xbf;Qu&#xe9; supuso cada paso para la autonom&#xed;a de Al-&#xc1;ndalus?","children":[],"payload":{"tag":"li","lines":"152,153","listIndex":2}},{"content":"3. &#xbf;Por qu&#xe9; se considera el <strong>Califato de C&#xf3;rdoba (929-1031)</strong> la &#xe9;poca de mayor esplendor? Cita figuras y hechos relevantes.","children":[],"payload":{"tag":"li","lines":"153,154","listIndex":3}},{"content":"4. Define el concepto de <strong>&quot;parias&quot;</strong> y relaci&#xf3;nalo con la debilidad de los <strong>reinos de taifas</strong> frente al avance cristiano.","children":[],"payload":{"tag":"li","lines":"154,155","listIndex":4}},{"content":"5. Compara el papel de <strong>almor&#xe1;vides</strong> y <strong>almohades</strong> en Al-&#xc1;ndalus. &#xbf;Por qu&#xe9; fue decisiva la batalla de <strong>Las Navas de Tolosa (1212)</strong>?","children":[],"payload":{"tag":"li","lines":"155,156","listIndex":5}},{"content":"6. Traza la evoluci&#xf3;n del <strong>reino nazar&#xed; de Granada (1238-1492)</strong> y explica por qu&#xe9; fue el &#xfa;ltimo territorio musulm&#xe1;n de la pen&#xed;nsula.","children":[],"payload":{"tag":"li","lines":"156,157","listIndex":6}}],"payload":{"tag":"h2","lines":"149,150"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
