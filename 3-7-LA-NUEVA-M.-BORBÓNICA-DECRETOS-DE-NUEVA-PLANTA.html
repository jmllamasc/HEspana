;a pactista de los Austrias a un <strong>Estado absolutista y<br>\ncentralista</strong> de modelo franc&#xe9;s. Los <strong>Decretos de Nueva Planta</strong> unificaron<br>\nel territorio bajo leyes castellanas, mientras las reformas administrativas<br>\necon&#xf3;micas y culturales del siglo XVIII modernizaron Espa&#xf1;a e introdujeron la<br>\n<strong>Ilustraci&#xf3;n</strong>, sentando las bases del Estado contempor&#xe1;neo.","children":[],"payload":{"tag":"li","lines":"76,83"}}],"payload":{"tag":"h2","lines":"75,76"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Decretos de Nueva Planta</strong> &#x2192; s&#xed;mbolo del centralismo borb&#xf3;nico y fin de los fueros de Arag&#xf3;n","children":[],"payload":{"tag":"li","lines":"84,85"}},{"content":"<strong>Felipe V (1700-1746)</strong> &#x2192; primer Borb&#xf3;n e instaurador del absolutismo","children":[],"payload":{"tag":"li","lines":"85,86"}},{"content":"<strong>Secretar&#xed;as de Despacho / Intendencias</strong> &#x2192; origen de ministerios y provincias actuales","children":[],"payload":{"tag":"li","lines":"86,87"}},{"content":"<strong>Catastro de Ensenada (1749)</strong> &#x2192; reforma fiscal ilustrada clave","children":[],"payload":{"tag":"li","lines":"87,88"}},{"content":"<strong>Regalismo / Concordato de 1753</strong> &#x2192; sometimiento de la Iglesia al poder real","children":[],"payload":{"tag":"li","lines":"88,89"}},{"content":"<strong>Carlos III</strong> &#x2192; consolidaci&#xf3;n del reformismo ilustrado","children":[],"payload":{"tag":"li","lines":"89,91"}}],"payload":{"tag":"h2","lines":"83,84"}},{"content":"Glosario","children":[{"content":"<strong>Borbones</strong> &#x2192; dinast&#xed;a de origen franc&#xe9;s instaurada en Espa&#xf1;a tras la Guerra de Sucesi&#xf3;n (s. XVIII)","children":[],"payload":{"tag":"li","lines":"94,95"}},{"content":"<strong>Absolutismo</strong> &#x2192; sistema en que el rey concentra todos los poderes sin l&#xed;mites institucionales"  qu&#xe9; territorios afectaron y cu&#xe1;les quedaron al margen.","children":[],"payload":{"tag":"li","lines":"137,138","listIndex":1}},{"content":"2. <strong>Explica</strong> las principales reformas administrativas introducidas por los Borbones en el siglo XVIII (Secretar&#xed;as de Despacho, Junta Suprema de Estado e Intendencias).","children":[],"payload":{"tag":"li","lines":"138,139","listIndex":2}},{"content":"3. <strong>Caracteriza</strong> el modelo de Estado implantado por <strong>Felipe V</strong> y se&#xf1;ala su inspiraci&#xf3;n y sus rasgos esenciales.","children":[],"payload":{"tag":"li","lines":"139,140","listIndex":3}},{"content":"4. <strong>Comenta</strong> las reformas econ&#xf3;micas borb&#xf3;nicas, deteni&#xe9;ndote en el papel del Estado y en el <strong>Catastro de Ensenada (1749)</strong>.","children":[],"payload":{"tag":"li","lines":"140,141","listIndex":4}},{"content":"5. <strong>Define</strong> el concepto de <em>Regalismo</em> y relaci&#xf3;nalo con el <strong>Concordato de 1753</strong>.","children":[],"payload":{"tag":"li","lines":"141,142","listIndex":5}},{"content":"6. <strong>Compara</strong> el modelo de Estado de los Austrias con el de los Borbones, se&#xf1;alando las principales diferencias.","children":[],"payload":{"tag":"li","lines":"142,143","listIndex":6}}],"payload":{"tag":"h2","lines":"136,137"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
