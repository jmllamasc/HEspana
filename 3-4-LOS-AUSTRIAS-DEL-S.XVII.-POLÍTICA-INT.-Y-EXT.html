ng> &#x2192; <em>Tratado de Lisboa (1668)</em>","children":[],"payload":{"tag":"li","lines":"21,23"}}],"payload":{"tag":"li","lines":"19,23"}}],"payload":{"tag":"h3","lines":"14,15"}},{"content":"3. Carlos II (1665-1700) &#x2192; la decadencia final","children":[{"content":"Inicio con la <strong>regencia de Mariana de Austria</strong>","children":[],"payload":{"tag":"li","lines":"24,25"}},{"content":"Sus validos <strong>mejoraron algo la econom&#xed;a</strong>","children":[],"payload":{"tag":"li","lines":"25,26"}},{"content":"Conflictos internos","children":[{"content":"<strong>Mot&#xed;n de los Gatos (1699)</strong>","children":[],"payload":{"tag":"li","lines":"27,28"}},{"content":"<strong>Segunda German&#xed;a</strong>","children":[],"payload":{"tag":"li","lines":"28,29"}}],"payload":{"tag":"li","lines":"26,29"}},{"content":"Muere <strong>sin descendencia</strong> &#x27f6; abre el problema sucesorio","children":[],"payload":{"tag":"li","lines":"29,31"}}],"payload":{"tag":"h3","lines":"23,24"}}],"payload":{"tag":"h2","lines":"8,9"}},{"content":"B. Pol&#xed;tica Exterior: Defensa de la Hegemon&#xed;a y el Catolicismo","children":[{"content":"1. Guerra de los Treinta A&#xf1;os (1618-1648)","children":[{"content":"Objetivo &#x2192; defender la <strong>hegemon&#xed;a</strong> espa&#xf1;ola y el <strong>catolicismo</strong>","children":[],"payload":{"tag":"li","lines":"36,37"}},{"content":"Victoria &#x2192; <strong>Breda</strong>","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"Derrota &#x2192; <strong>Rocroi</strong>","children":[],"payload":{"tag":"li","lines":"38,39"}},{"content":"<strong>Paz de Westfalia (1648)</strong> &#x2192; reconoci&#xf3; la independencia de las <strong>Provincias Unidas</strong>","children":[],"payload":{"tag":"li","lines":"39,41"}}],"payload":{"tag":"h3","lines":"35,36"}},{"content":"2. Paz de los Pirineos (1659)","children":[{"content":"Marc&#xf3; la <strong>decadencia espa&#xf1;ola</strong> &#x2194; <strong>ascenso de Francia</strong>","children":[],"payload":{"tag":"li","lines":"42,43"}},{"content":"Sellada con el matrimonio <strong>Luis XIV &#x2194; Mar&#xed;a Teresa de Austria</strong>","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"&#x27f6; Origen de futuras <strong>aspiraciones borb&#xf3;nicas</strong>","children":[],"payload":{"tag":"li","lines":"44,46"}}],"payload":{"tag":"h3","lines":"41,42"}}],"payload":{"tag":"h2","lines":"33,34"}},{"content":"C. La Guerra de Sucesi&#xf3;n (1701-1714)","children":[{"content":"Causa &#x2192; muerte de <strong>Carlos II sin descendencia</strong>","children":[],"payload":{"tag":"li","lines":"50,51"}},{"content":"Contendientes:","children":[{"content":"<strong>Felipe de Anjou</strong> <em>(Borb&#xf3;n)</em>","children":[],"payload":{"tag":"li","lines":"52,53"}},{"content":"<strong>Carlos de Austria</strong>","children":[],"payload":{"tag":"li","lines":"53,54"}}],"payload":{"tag":"li","lines":"51,54"}},{"content":"Victorias decisivas &#x2192; <strong>Almansa</strong> y <strong>Villaviciosa</strong>","children":[],"payload":{"tag":"li","lines":"54,55"}},{"content":"Resultado &#x2192; triunfo de <strong>Felipe V</strong>","children":[],"payload":{"tag":"li","lines":"55,56"}},{"content":"<strong>Tratado de Utrecht</strong> &#x27f6; consolid&#xf3; la <strong>dinast&#xed;a borb&#xf3;nica</strong>","children":[],"payload":{"tag":"li","lines":"56,58"}}],"payload":{"tag":"h2","lines":"48,49"}},{"content":"Conclusi&#xf3;n","children":[{"content":"El S. XVII supuso para la Monarqu&#xed;a Hisp&#xe1;nica el paso de la <strong>hegemon&#xed;a<br>\na la decadencia</strong>. La delegaci&#xf3;n del poder en <em>validos</em>, las reformas<br>\nfracasadas de Olivares y la <strong>crisis de 1640</strong> debilitaron internamente al<br>\nEstado, mientras Westfalia y los Pirineos certificaban el fin del<br>\npredominio espa&#xf1;ol frente a Francia. La extinci&#xf3;n de los Austrias con<br>\n<strong>Carlos II</strong> desemboc&#xf3; en la <strong>Guerra de Sucesi&#xf3;n</strong>, que instaur&#xf3; la<br>\ndinast&#xed;a <strong>Borb&#xf3;n</strong> y abri&#xf3; la Edad Contempor&#xe1;nea espa&#xf1;ola.","children":[],"payload":{"tag":"li","lines":"62,70"}}],"payload":{"tag":"h2","lines":"60,61"}},{"content":"Ideas clave para la PAU","children":[{"content":"<strong>Validos</strong> &#x2192; clave para entender el modelo de gobierno de los Austrias menores","children":[],"payload":{"tag":"li","lines":"72,73"}},{"content":"<strong>Expulsi&#xf3;n de los moriscos (1609)</strong> &#x2192; factor de agravamiento de la crisis econ&#xf3;mica","children":[],"payload":{"tag":"li","lines":"73,74"}},{"content":"<strong>Crisis de 1640</strong> (Catalu&#xf1;a y Portugal) &#x2192; fractura interna de la Monarqu&#xed;a","children":[],"payload":{"tag":"li","lines":"74,75"}},{"content":"<strong>Rocroi (1643) y Paz de Westfalia (1648)</strong> &#x2192; s&#xed;mbolos del fin de la hegemon&#xed;a militar","children":[],"payload":{"tag":"li","lines":"75,76"}},{"content":"<strong>Paz de los Pirineos (1659)</strong> &#x2192; ascenso de Francia y origen de las aspiraciones borb&#xf3;nicas","children":[],"payload":{"tag":"li","lines":"76,77"}},{"content":"<strong>Tratado de Utrecht (1714)</strong> &#x2192; consolidaci&#xf3;n de la dinast&#xed;a borb&#xf3;nica","children":[],"payload":{"tag":"li","lines":"77,79"}}],"payload":{"tag":"h2","lines":"70,71"}},{"content":"Glosario de t&#xe9;rminos clave","children":[{"content":"\n<blockquote data-lines=\"83,84\">\n<p data-lines=\"83,84\"><strong>VALIDO:</strong> noble de confianza en quien el rey delega el gobierno, al margen de los <em>consejos</em> &#x2192; caracter&#xed;stico de los Austrias menores.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"83,85"}},{"content":"\n<blockquote data-lines=\"85,86\">\n<p data-lines=\"85,86\"><strong>AUSTRIAS MENORES:</strong> Felipe III, Felipe IV y Carlos II &#x2192; monarcas del S. XVII bajo los que la Monarqu&#xed;a Hisp&#xe1;nica entra en decadencia.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"85,87"}},{"content":"\n<blockquote data-lines=\"87,88\">\n<p data-lines=\"87,88\"><strong>MORISCOS:</strong> descendientes de musulmanes convertidos al cristianismo &#x2192; su <strong>expulsi&#xf3;n (1609)</strong> priv&#xf3; al campo, sobre todo levantino, de mano de obra.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"87,89"}},{"content":"\n<blockquote data-lines=\"89,90\">\n<p data-lines=\"89,90\"><strong>UNI&#xd3;N DE ARMAS:</strong> proyecto de <strong>Olivares</strong> &#x2192; ej&#xe9;rcito permanente costeado por todos los reinos seg&#xfa;n su poblaci&#xf3;n y riqueza.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"89,91"}},{"content":"\n<blockquote data-lines=\"91,92\">\n<p data-lines=\"91,92\"><strong>GRAN MEMORIAL:</strong> documento de <strong>Olivares</strong> &#x2192; propuesta de <strong>unificaci&#xf3;n jur&#xed;dica</strong> de los reinos bajo las leyes de Castilla.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"91,93"}},{"content":"\n<blockquote data-lines=\"93,94\">\n<p data-lines=\"93,94\"><strong>HEGEMON&#xcd;A:</strong> posici&#xf3;n de predominio pol&#xed;tico-militar de un Estado sobre los dem&#xe1;s &#x2192; Espa&#xf1;a la pierde a lo largo del S. XVII.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"93,95"}},{"content":"\n<blockquote data-lines=\"95,96\">\n<p data-lines=\"95,96\"><strong>REGENCIA:</strong> gobierno provisional durante la minor&#xed;a de edad de un rey &#x2192; ejercida por <strong>Mariana de Austria</strong> al inicio del reinado de Carlos II.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"95,97"}},{"content":"\n<blockquote data-lines=\"97,98\">\n<p data-lines=\"97,98\"><strong>DINAST&#xcd;A:</strong> familia de monarcas que se suceden en el trono &#x2192; los <strong>Austrias</strong> (Habsburgo) dan paso a los <strong>Borbones</strong> en 1700.</p>\n</blockquote>","children":[],"payload":{"tag":"li","lines":"97,99"}}],"payload":{"tag":"h2","lines":"81,82"}},{"content":"Ficha de repaso r&#xe1;pido","children":[{"content":"","children":[{"content":"<strong>Felipe III (1598-1621)</strong> + Lerma &#x2192; pacifismo + <strong>expulsi&#xf3;n moriscos (1609)</strong>","children":[],"payload":{"tag":"li","lines":"105,106"}},{"content":"<strong>Felipe IV (1621-1665)</strong> + Olivares &#x2192; reformas (banco, <em>Gran Memorial</em>, <em>Uni&#xf3;n de Armas</em>) &#x2192; <strong>crisis de 1640</strong> (Catalu&#xf1;a + Portugal)","children":[],"payload":{"tag":"li","lines":"106,107"}},{"content":"<strong>Carlos II (1665-1700)</strong> &#x2192; decadencia + muerte <strong>sin descendencia</strong>","children":[],"payload":{"tag":"li","lines":"107,109"}}],"payload":{"tag":"ul","lines":"105,109"}},{"content":"","children":[{"content":"<strong>Guerra de los 30 A&#xf1;os (1618-1648)</strong> &#x2192; Breda <em>(victoria)</em> &#x2194; Rocroi <em>(derrota)</em>","children":[],"payload":{"tag":"li","lines":"110,111"}},{"content":"<strong>Paz de Westfalia (1648)</strong> &#x2192; independencia de las <strong>Provincias Unidas</strong>","children":[],"payload":{"tag":"li","lines":"111,112"}},{"content":"<strong>Paz de los Pirineos (1659)</strong> &#x2192; decadencia Espa&#xf1;a &#x2194; ascenso Francia","children":[],"payload":{"tag":"li","lines":"112,114"}}],"payload":{"tag":"ul","lines":"110,114"}}],"payload":{"tag":"h2","lines":"101,102"}},{"content":"Tabla comparativa de los reinados","children":[{"content":"<table data-lines=\"120,128\">\n<thead data-lines=\"120,121\">\n<tr data-lines=\"120,121\">\n<th>Elemento</th>\n<th>Felipe III (1598-1621)</th>\n<th>Felipe IV (1621-1665)</th>\n<th>Carlos II (1665-1700)</th>\n</tr>\n</thead>\n<tbody data-lines=\"122,128\">\n<tr data-lines=\"122,123\">\n<td><strong>Valido / Regencia</strong></td>\n<td>Duque de Lerma</td>\n<td>Conde-Duque de Olivares</td>\n<td>Mariana de Austria <em>(regencia)</em> + validos</td>\n</tr>\n<tr data-lines=\"123,124\">\n<td><strong>Pol&#xed;tica interior</strong></td>\n<td>Pacifismo &#xb7; expulsi&#xf3;n moriscos</td>\n<td>Reformas centralizadoras</td>\n<td>Leve mejora econ&#xf3;mica</td>\n</tr>\n<tr data-lines=\"124,125\">\n<td><strong>Hecho clave</strong></td>\n<td><strong>Expulsi&#xf3;n moriscos (1609)</strong></td>\n<td><strong>Crisis de 1640</strong></td>\n<td>Muerte <strong>sin descendencia</strong></td>\n</tr>\n<tr data-lines=\"125,126\">\n<td><strong>Conflictos</strong></td>\n<td>&#x2014;</td>\n<td>Rebeli&#xf3;n Catalu&#xf1;a &#xb7; indep. Portugal</td>\n<td>Mot&#xed;n de los Gatos &#xb7; 2&#xaa; German&#xed;a</td>\n</tr>\n<tr data-lines=\"126,127\">\n<td><strong>Pol&#xed;tica exterior</strong></td>\n<td>Tregua / paz</td>\n<td>Guerra de los 30 A&#xf1;os</td>\n<td>Decadencia continuada</td>\n</tr>\n<tr data-lines=\"127,128\">\n<td><strong>Tendencia</strong></td>\n<td>Inicio del declive</td>\n<td>Punto de inflexi&#xf3;n</td>\n<td>Fin de los Austrias</td>\n</tr>\n</tbody>\n</table>","children":[],"payload":{"tag":"table","lines":"120,128"}}],"payload":{"tag":"h2","lines":"118,119"}},{"content":"Preguntas tipo PAU","children":[{"content":"1. <strong>Define</strong> el concepto de <em>valido</em> y explica su papel en el gobierno de los Austrias del S. XVII.","children":[],"payload":{"tag":"li","lines":"133,134","listIndex":1}},{"content":"2. Explica las causas y consecuencias de la <strong>expulsi&#xf3;n de los moriscos (1609)</strong>.","children":[],"payload":{"tag":"li","lines":"134,135","listIndex":2}},{"content":"3. Analiza las <strong>reformas del Conde-Duque de Olivares</strong> y su relaci&#xf3;n con la <strong>crisis de 1640</strong>.","children":[],"payload":{"tag":"li","lines":"135,136","listIndex":3}},{"content":"4. Comenta la participaci&#xf3;n de Espa&#xf1;a en la <strong>Guerra de los Treinta A&#xf1;os</strong> y el significado de la <strong>Paz de Westfalia (1648)</strong>.","children":[],"payload":{"tag":"li","lines":"136,137","listIndex":4}},{"content":"5. &#xbf;Por qu&#xe9; la <strong>Paz de los Pirineos (1659)</strong> se considera s&#xed;mbolo de la decadencia espa&#xf1;ola y del ascenso de Francia?","children":[],"payload":{"tag":"li","lines":"137,138","listIndex":5}},{"content":"6. Explica las causas, contendientes y consecuencias de la <strong>Guerra de Sucesi&#xf3;n (1701-1714)</strong>.","children":[],"payload":{"tag":"li","lines":"138,139","listIndex":6}},{"content":"7. <strong>Pregunta de s&#xed;ntesis:</strong> Caracteriza la evoluci&#xf3;n pol&#xed;tica de la Monarqu&#xed;a Hisp&#xe1;nica durante el S. XVII desde Felipe III hasta Carlos II.","children":[],"payload":{"tag":"li","lines":"139,140","listIndex":7}}],"payload":{"tag":"h2","lines":"131,132"}}],"payload":{"tag":"h1","lines":"0,1"}},{})</script>
